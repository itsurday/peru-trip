<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Uday's Peru Trip</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --gold: #C8933A;
    --gold-light: #F5E6C8;
    --dark: #1A1A1A;
    --dark2: #2A2A2A;
    --dark3: #3A3A3A;
    --text: #E8E0D0;
    --text-muted: #9A8E7E;
    --green: #2D6A4F;
    --green-light: #40916C;
    --red: #9B2335;
    --blue: #1B4F72;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--dark);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    padding: 0;
  }
  .header {
    background: linear-gradient(135deg, #1A1208 0%, #2A1F0A 50%, #1A1208 100%);
    border-bottom: 1px solid var(--gold);
    padding: 20px 20px 16px;
    text-align: center;
    position: relative;
  }
  .header-top {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    margin-bottom: 4px;
  }
  .flag { font-size: 20px; }
  .header h1 {
    font-family: 'Playfair Display', serif;
    font-size: 22px;
    font-weight: 500;
    color: var(--gold);
    letter-spacing: 0.02em;
  }
  .header-sub {
    font-size: 12px;
    color: var(--text-muted);
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }
  .live-time {
    position: absolute;
    top: 16px;
    right: 16px;
    font-size: 11px;
    color: var(--text-muted);
    font-weight: 300;
    text-align: right;
    line-height: 1.4;
  }
  .timezone-note {
    font-size: 9px;
    color: #6A5E4E;
    margin-top: 1px;
  }
  .main { padding: 16px; max-width: 480px; margin: 0 auto; }
  .day-selector {
    display: flex;
    gap: 6px;
    overflow-x: auto;
    padding-bottom: 4px;
    margin-bottom: 16px;
    scrollbar-width: none;
  }
  .day-selector::-webkit-scrollbar { display: none; }
  .day-btn {
    flex-shrink: 0;
    background: var(--dark2);
    border: 1px solid var(--dark3);
    border-radius: 20px;
    padding: 6px 14px;
    font-size: 12px;
    color: var(--text-muted);
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    transition: all 0.2s;
    white-space: nowrap;
  }
  .day-btn.active {
    background: var(--gold);
    border-color: var(--gold);
    color: var(--dark);
    font-weight: 500;
  }
  .day-btn.today {
    border-color: var(--gold);
    color: var(--gold);
  }
  .current-card {
    background: linear-gradient(135deg, #1C2E1C, #162816);
    border: 1px solid var(--green-light);
    border-radius: 16px;
    padding: 18px;
    margin-bottom: 12px;
    position: relative;
    overflow: hidden;
  }
  .current-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, var(--green), var(--green-light), var(--green));
  }
  .next-card {
    background: var(--dark2);
    border: 1px solid var(--dark3);
    border-radius: 16px;
    padding: 18px;
    margin-bottom: 12px;
    position: relative;
  }
  .card-label {
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .current-card .card-label { color: var(--green-light); }
  .next-card .card-label { color: var(--text-muted); }
  .pulse {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--green-light);
    animation: pulse 2s infinite;
    flex-shrink: 0;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.4; transform: scale(0.8); }
  }
  .activity-time {
    font-size: 11px;
    color: var(--text-muted);
    margin-bottom: 4px;
    font-weight: 300;
  }
  .activity-name {
    font-family: 'Playfair Display', serif;
    font-size: 20px;
    font-weight: 400;
    color: var(--text);
    line-height: 1.3;
    margin-bottom: 6px;
  }
  .activity-desc {
    font-size: 13px;
    color: var(--text-muted);
    line-height: 1.6;
    font-weight: 300;
  }
  .tag {
    display: inline-block;
    font-size: 10px;
    padding: 2px 8px;
    border-radius: 99px;
    margin-bottom: 8px;
    font-weight: 500;
    letter-spacing: 0.04em;
    text-transform: uppercase;
  }
  .tag-logistics { background: #1B3A5C; color: #7EC8E3; }
  .tag-morning { background: #3D2B00; color: #FFBC42; }
  .tag-afternoon { background: #0D3328; color: #56D98F; }
  .tag-evening { background: #2A1A40; color: #B09FE8; }
  .tag-birthday { background: #3D0A1E; color: #FF7AAD; }
  .tag-priority { background: #3D0000; color: #FF7070; }
  .progress-bar {
    margin-top: 12px;
    height: 3px;
    background: var(--dark3);
    border-radius: 99px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: var(--green-light);
    border-radius: 99px;
    transition: width 1s linear;
  }
  .progress-label {
    display: flex;
    justify-content: space-between;
    font-size: 10px;
    color: var(--text-muted);
    margin-top: 5px;
  }
  .timeline {
    margin-top: 4px;
  }
  .tl-item {
    display: flex;
    gap: 12px;
    margin-bottom: 2px;
    padding: 10px 0;
    border-bottom: 1px solid #252525;
    cursor: pointer;
    transition: all 0.15s;
    border-radius: 8px;
    padding-left: 4px;
  }
  .tl-item:last-child { border-bottom: none; }
  .tl-item.active-item {
    background: rgba(64,145,108,0.08);
    padding-left: 8px;
    border-bottom-color: transparent;
    border-radius: 10px;
    margin-bottom: 4px;
  }
  .tl-item.past-item { opacity: 0.4; }
  .tl-time {
    width: 46px;
    flex-shrink: 0;
    font-size: 11px;
    color: var(--text-muted);
    padding-top: 2px;
    font-weight: 300;
  }
  .tl-dot-col {
    display: flex;
    flex-direction: column;
    align-items: center;
    width: 16px;
    flex-shrink: 0;
  }
  .tl-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    margin-top: 4px;
    flex-shrink: 0;
  }
  .tl-dot.done { background: var(--dark3); }
  .tl-dot.now { background: var(--green-light); box-shadow: 0 0 6px var(--green-light); }
  .tl-dot.future { background: var(--dark3); border: 1px solid #4A4A4A; }
  .tl-dot.priority { background: var(--red); }
  .tl-dot.birthday { background: #D4537E; }
  .tl-stem {
    width: 1px;
    flex: 1;
    min-height: 8px;
    background: var(--dark3);
    margin-top: 3px;
  }
  .tl-body { flex: 1; }
  .tl-name {
    font-size: 13px;
    font-weight: 400;
    color: var(--text);
    line-height: 1.3;
    margin-bottom: 1px;
  }
  .tl-name.done { color: var(--text-muted); }
  .tl-sub {
    font-size: 11px;
    color: #5A5040;
    font-weight: 300;
  }
  .section-title {
    font-size: 11px;
    font-weight: 500;
    color: var(--text-muted);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin: 16px 0 10px;
  }
  .emergency-card {
    background: linear-gradient(135deg, #1A0A0A, #200D0D);
    border: 1px solid #4A1515;
    border-radius: 16px;
    padding: 16px;
    margin-top: 4px;
  }
  .emergency-title {
    font-size: 11px;
    color: #FF7070;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    font-weight: 500;
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .em-item {
    display: flex;
    flex-direction: column;
    margin-bottom: 10px;
    padding-bottom: 10px;
    border-bottom: 1px solid #2A1515;
  }
  .em-item:last-child { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }
  .em-label { font-size: 11px; color: #8A6060; margin-bottom: 2px; font-weight: 300; }
  .em-val { font-size: 13px; color: var(--text); font-weight: 400; }
  .em-val a { color: #FF9090; text-decoration: none; }
  .hotel-card {
    background: var(--dark2);
    border: 1px solid var(--dark3);
    border-radius: 12px;
    padding: 14px;
    margin-bottom: 8px;
  }
  .hotel-dates { font-size: 11px; color: var(--text-muted); margin-bottom: 3px; font-weight: 300; }
  .hotel-name { font-size: 14px; color: var(--text); font-weight: 400; margin-bottom: 2px; }
  .hotel-loc { font-size: 11px; color: #6A5E4E; }
  .no-activity {
    text-align: center;
    padding: 40px 20px;
    color: var(--text-muted);
  }
  .no-activity .big { font-family: 'Playfair Display', serif; font-size: 18px; color: var(--gold); margin-bottom: 8px; }
  .birthday-banner {
    background: linear-gradient(135deg, #2A0A18, #1E0812);
    border: 1px solid #7A2040;
    border-radius: 12px;
    padding: 12px 16px;
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .birthday-banner .bday-icon { font-size: 22px; }
  .birthday-banner .bday-text { font-size: 13px; color: #F0A0C0; line-height: 1.4; }
  .birthday-banner .bday-text strong { color: #FFB8D4; }
</style>
</head>
<body>

<div class="header">
  <div class="live-time" id="liveTime"></div>

    { time: '16:30', name: 'Town stroll + artisan market', desc: 'Manco Capac Square. Buy kid a Machu Picchu souvenir to build tomorrow\'s excitement.', type: 'afternoon', end: '19:00' },

    { time: '20:00', name: 'Arrive Bogota + Hilton Garden Inn shuttle', desc: 'Call hotel from arrivals for free shuttle. Check in. Spa whirlpool open late.', type: 'logistics', end: '22:00' },

};

const TYPE_CONFIG = {
  logistics: { label: 'Transit / logistics', cls: 'tag-logistics', dot: 'future' },
  morning: { label: 'Morning', cls: 'tag-morning', dot: 'future' },
  afternoon: { label: 'Afternoon', cls: 'tag-afternoon', dot: 'future' },
  evening: { label: 'Evening', cls: 'tag-evening', dot: 'future' },
  birthday: { label: '🎂 Birthday', cls: 'tag-birthday', dot: 'birthday' },
  priority: { label: '⚠️ Priority', cls: 'tag-priority', dot: 'priority' },
};

function getPeruTime() {
  const now = new Date();
  const peruStr = now.toLocaleString('en-US', { timeZone: TRIP_TIMEZONE });
  return new Date(peruStr);
}

function getTodayDayId() {
  const now = getPeruTime();
  const y = now.getFullYear();
  const m = String(now.getMonth() + 1).padStart(2, '0');
  const d = String(now.getDate()).padStart(2, '0');
  const dateStr = `${y}-${m}-${d}`;
  const found = DAYS.find(d => d.date === dateStr);
  return found ? found.id : null;
}

function timeToMins(t) {
  const [h, m] = t.split(':').map(Number);
  return h * 60 + m;
}

function getNowMins() {
  const p = getPeruTime();
  return p.getHours() * 60 + p.getMinutes();
}

let selectedDay = getTodayDayId() || 'may1';

function updateClock() {
  const now = new Date();
  const peruNow = new Date(now.toLocaleString('en-US', { timeZone: TRIP_TIMEZONE }));
  const bogNow = new Date(now.toLocaleString('en-US', { timeZone: 'America/Bogota' }));
  const chiNow = new Date(now.toLocaleString('en-US', { timeZone: 'America/Chicago' }));
  const fmt = d => d.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', hour12: true });
  const fmtDate = d => d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
  const el = document.getElementById('liveTime');
  if (el) {
    const isTrip = getTodayDayId();
    if (isTrip) {
      el.innerHTML = `🇵🇪 ${fmt(peruNow)}<div class="timezone-note">Lima time · ${fmtDate(peruNow)}</div>`;
    } else {
      el.innerHTML = `🏠 ${fmt(chiNow)}<div class="timezone-note">Chicago · ${fmtDate(chiNow)}</div>`;
    }
  }
}

function renderDaySelector() {
  const todayId = getTodayDayId();
  const sel = document.getElementById('daySelector');
  sel.innerHTML = DAYS.map(d => {
    let cls = 'day-btn';
    if (d.id === selectedDay) cls += ' active';
    else if (d.id === todayId) cls += ' today';
    return `<button class="${cls}" onclick="selectDay('${d.id}')">${d.label}<br><span style="font-size:10px;opacity:0.7">${d.sublabel}</span></button>`;
  }).join('');
}

function selectDay(id) {
  selectedDay = id;
  renderDaySelector();
  renderContent();
}

function renderContent() {
  const el = document.getElementById('content');
  const todayId = getTodayDayId();
  const isToday = selectedDay === todayId;
  const items = SCHEDULE[selectedDay] || [];
  const nowMins = getNowMins();
  const dayInfo = DAYS.find(d => d.id === selectedDay);
  const isBirthday = selectedDay === 'may3';

  let html = '';

  if (isBirthday) {
    html += `<div class="birthday-banner">
      <span class="bday-icon">🎂</span>
      <div class="bday-text"><strong>Happy Birthday!</strong> Today is the day — Machu Picchu at sunrise. The most magical birthday possible.</div>
    </div>`;
  }

  if (isToday && items.length) {
    let currentIdx = -1;
    let nextIdx = -1;
    for (let i = 0; i < items.length; i++) {
      const start = timeToMins(items[i].time);
      const end = timeToMins(items[i].end);
      if (nowMins >= start && nowMins < end) { currentIdx = i; break; }
      if (nowMins < start) { nextIdx = i; break; }
    }
    if (currentIdx === -1 && nextIdx === -1) currentIdx = items.length - 1;

    const current = currentIdx >= 0 ? items[currentIdx] : null;
    const next = nextIdx >= 0 ? items[nextIdx] : (currentIdx >= 0 && currentIdx < items.length - 1 ? items[currentIdx + 1] : null);

    if (current) {
      const startMins = timeToMins(current.time);
      const endMins = timeToMins(current.end);
      const totalDur = endMins - startMins;
      const elapsed = nowMins - startMins;
      const pct = Math.min(100, Math.max(0, Math.round((elapsed / totalDur) * 100)));
      const remaining = endMins - nowMins;
      const remStr = remaining > 60 ? `${Math.floor(remaining/60)}h ${remaining%60}m left` : `${remaining}m left`;
      const tc = TYPE_CONFIG[current.type] || TYPE_CONFIG.logistics;

      html += `<div class="current-card">
        <div class="card-label"><span class="pulse"></span> Happening now</div>
        <span class="tag ${tc.cls}">${tc.label}</span>
        <div class="activity-time">${current.time} – ${current.end}</div>
        <div class="activity-name">${current.name}</div>
        <div class="activity-desc">${current.desc}</div>
        <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
        <div class="progress-label"><span>${pct}% complete</span><span>${remStr}</span></div>
      </div>`;
    }

    if (next) {
      const tc = TYPE_CONFIG[next.type] || TYPE_CONFIG.logistics;
      const startsIn = timeToMins(next.time) - nowMins;
      const startsStr = startsIn > 60 ? `in ${Math.floor(startsIn/60)}h ${startsIn%60}m` : `in ${startsIn} min`;
      html += `<div class="next-card">
        <div class="card-label">Up next · ${startsStr}</div>
        <span class="tag ${tc.cls}">${tc.label}</span>
        <div class="activity-time">${next.time} – ${next.end}</div>
        <div class="activity-name">${next.name}</div>
        <div class="activity-desc">${next.desc}</div>
      </div>`;
    }

    if (!current && !next) {
      html += `<div class="no-activity"><div class="big">Day complete ✓</div><div>All activities for today are done.</div></div>`;
    }
  } else if (!isToday) {
    html += `<div style="background:var(--dark2);border:1px solid var(--dark3);border-radius:12px;padding:12px 16px;margin-bottom:12px;font-size:13px;color:var(--text-muted);">
      📅 Viewing <strong style="color:var(--gold)">${dayInfo.label} — ${dayInfo.sublabel}</strong>. Switch to today to see live progress.
    </div>`;
  }

  html += `<div class="section-title">Full day schedule</div><div class="timeline">`;
  items.forEach((item, i) => {
    const tc = TYPE_CONFIG[item.type] || TYPE_CONFIG.logistics;
    let itemState = 'future';
    let nameCls = '';
    if (isToday) {
      const start = timeToMins(item.time);
      const end = timeToMins(item.end);
      if (nowMins > end) { itemState = 'past'; nameCls = 'done'; }
      else if (nowMins >= start && nowMins < end) itemState = 'active';
    }
    const dotCls = itemState === 'past' ? 'done' : itemState === 'active' ? 'now' : tc.dot || 'future';
    const liCls = itemState === 'active' ? 'tl-item active-item' : itemState === 'past' ? 'tl-item past-item' : 'tl-item';
    const isLast = i === items.length - 1;
    html += `<div class="${liCls}">
      <div class="tl-time">${item.time}</div>
      <div class="tl-dot-col">
        <div class="tl-dot ${dotCls}"></div>
        ${!isLast ? '<div class="tl-stem"></div>' : ''}
      </div>
      <div class="tl-body">
        <div class="tl-name ${nameCls}">${item.name}</div>
        <div class="tl-sub">${item.desc.substring(0, 70)}${item.desc.length > 70 ? '…' : ''}</div>
      </div>
    </div>`;
  });
  html += `</div>`;

  html += `<div class="section-title">Hotels</div>
  <div class="hotel-card">
    <div class="hotel-dates">May 1–3 · 2 nights</div>
    <div class="hotel-name">Casa Andina Standard Machu Picchu</div>
    <div class="hotel-loc">Aguas Calientes, Peru</div>
  </div>
  <div class="hotel-card">
    <div class="hotel-dates">May 3–5 · 2 nights</div>
    <div class="hotel-name">Cusco Hotel — TBD</div>
    <div class="hotel-loc">Cusco, Peru</div>
  </div>
  <div class="hotel-card">
    <div class="hotel-dates">May 5–6 · 1 night</div>
    <div class="hotel-name">Hilton Garden Inn Bogota Airport</div>
    <div class="hotel-loc">Bogota, Colombia</div>
  </div>`;

  html += `<div class="section-title">Emergency contacts</div>
  <div class="emergency-card">
    <div class="emergency-title">🆘 Emergency</div>
    <div class="em-item">
      <div class="em-label">Tour guide — TreXperience (Jazmin)</div>
      <div class="em-val"><a href="tel:+18886414007">+1 (888) 641-4007</a> · <a href="https://wa.me/51955261889">WhatsApp +51 955 261 889</a></div>
    </div>
    <div class="em-item">
      <div class="em-label">Avianca airlines</div>
      <div class="em-val"><a href="tel:+18002842622">1-800-284-2622</a></div>
    </div>
    <div class="em-item">
      <div class="em-label">Peru police emergency</div>
      <div class="em-val"><a href="tel:105">105</a> · Tourist Police: <a href="tel:+518423235123">+51 84 235 123</a></div>
    </div>
    <div class="em-item">
      <div class="em-label">Colombia emergency</div>
      <div class="em-val"><a href="tel:123">123</a></div>
    </div>
    <div class="em-item">
      <div class="em-label">Casa Andina — Aguas Calientes</div>
      <div class="em-val">Add after booking confirmation</div>
    </div>
  </div>

  <div style="text-align:center;padding:24px 0 8px;font-size:11px;color:#3A3228;">Built with love for Uday's family · Peru 2026</div>`;

  el.innerHTML = html;
}

renderDaySelector();
renderContent();
updateClock();
setInterval(updateClock, 30000);
setInterval(() => { renderDaySelector(); renderContent(); }, 60000);
</script>
</body>
</html>
