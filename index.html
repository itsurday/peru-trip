    { time:"10:50", end:"12:00", name:"La Candelaria — quick historic stroll", desc:"Plaza Bolivar, Chorro de Quevedo plaza, street murals, Colombian empanadas from street vendors. Vibrant and colourful. About 1 hour — keep an eye on the time, airport by 12:30pm!", type:"afternoon", place:"La Candelaria, Bogota", facts:["Plaza Bolivar is the heart of La Candelaria — surrounded by the Capitol, City Hall, Supreme Court, Cathedral.","Simon Bolivar liberated Colombia, Venezuela, Ecuador, Peru, and Bolivia from Spanish rule.","The street art murals in La Candelaria are world-famous — some cover entire 10-story buildings.","Colombian empanadas are fried, filled with chicken, and served with hot sauce — try one!","Chorro de Quevedo plaza is where Bogota was officially founded on August 6, 1538.","Street performers in La Candelaria include tango dancers, magicians, and traditional cumbia drummers.","The Botero Museum nearby is free and contains original paintings by Colombia most famous artist.","La Candelaria streets are safe and busy during the day — stick to the main plazas.","After La Candelaria you will have seen: Machu Picchu, Cusco, Aguas Calientes, Bogota — what a trip!","Buy a Colombian coffee from a street vendor here — the best and cheapest cup of the day."] },
    { time:"12:00", end:"12:30", name:"Uber to Hilton — collect bags", desc:"Uber back to Hilton Garden Inn. Collect all luggage from reception. Head straight to El Dorado — no time to spare! Buy Colombian coffee at airport duty-free.", type:"logistics", place:"Bogota", facts:["El Dorado Airport is Colombia busiest airport — allow at least 2 hrs for international check-in.","The airport has excellent duty-free shopping: Colombian coffee, emeralds, rum, and handicrafts.","Colombian emeralds are considered the finest in the world — 70-90% of global production from Colombia.","Juan Valdez coffee shop in the airport sells fresh-brewed Colombian single-origin coffee.","AV262 departs at 2:50pm — be at the airport by 12:30pm for smooth check-in and security.","You are heading home from one of the most incredible travel itineraries possible in South America.","The whole family has now seen: Cusco, Sacred Valley, Aguas Calientes, Machu Picchu, and Bogota.","Buy Colombian ground coffee at the airport — it makes an amazing souvenir that people actually use.","Three countries in one trip: USA, Peru, Colombia. With an 8-year-old. On a birthday. Outstanding.","The flight back to Chicago will feel very different from the excited anticipation of the outbound journey."] },
    { time:"12:30", end:"14:50", name:"El Dorado Airport — AV262 check-in", desc:"Arrive by 12:30pm. International check-in, security, immigration. Buy Colombian coffee and emeralds at duty-free. AV262 departs 2:50pm.", type:"logistics", place:"El Dorado Airport, Bogota", facts:["El Dorado Airport is named after the legendary lost city of gold that Spanish conquistadors hunted for centuries.","The airport serves about 35 million passengers per year — one of the busiest in Latin America.","Juan Valdez coffee (Colombia iconic brand) has shops throughout the airport.","Colombian emeralds sold in airport shops are certified conflict-free.","Avianca flight AV262 will arrive in Chicago — completing the full loop: ORD to BOG to CUZ to BOG to ORD.","Allow extra time for international security — El Dorado can have long queues at peak times.","The trip cost, memories, and experiences will be talked about in your family for the rest of your lives.","The 8-year-old has now seen: a Wonder of the World, cloud forests, Andean ruins, and a colonial capital.","Safe travels home — what an extraordinary week. Peru and Colombia equals unforgettable.","You are flying home from South America after one of the most incredible family trips possible."] },
    { time:"14:50", end:"23:59", name:"AV262 — Bogota to Chicago (ORD)", desc:"Departs 2:50pm. Homebound. Trip complete — Machu Picchu Circuit 2A on a birthday, Peru + Bogota. Unforgettable.", type:"logistics", place:"Heading Home", facts:["You are flying home from South America after one of the most incredible family trips possible.","Total distance traveled this week: approximately 12,000 km — nearly halfway around the Earth!","You have been to: Chicago, Bogota, Cusco, Ollantaytambo, Aguas Calientes, Machu Picchu, Cusco, Bogota, Chicago.","Your 8-year-old has stood at a Wonder of the World, ridden a panoramic train, and soaked in natural hot springs.","The birthday girl celebrated at Machu Picchu Circuit 2A at 8am — there are very few birthdays more epic than that.","Machu Picchu, Qorikancha, Sacsayhuaman, Qenqo, Ollantaytambo, Monserrate — 6 extraordinary sites in 6 days.","You ate trucha andina, aji de gallina, trout ceviche, Andean ceviche, and Colombian empanadas.","You rode the Vistadome Observatory train, a cable car over Bogota, and a bus with 13 hairpin turns.","The altitude challenges, the early mornings, the llamas, the salt mines — all part of the story now.","Welcome home, family. That was truly extraordinary. Start planning the next one!"] }
  ]

function toMins(t){var p=t.split(":");return parseInt(p[0])*60+parseInt(p[1]);}
function getPeruTime(){return new Date(new Date().toLocaleString("en-US",{timeZone:"America/Lima"}));}
function getTodayKey(){var d=getPeruTime();return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");}
function fmtCountdown(ms){var s=Math.floor(ms/1000);return{d:Math.floor(s/86400),h:Math.floor((s%86400)/3600),m:Math.floor((s%3600)/60),s:s%60};}
function revealFact(i){var el=document.getElementById("fact-"+i);if(el)el.classList.toggle("revealed");}

function buildFlightCard(from,fromCity,to,toCity,fnum,dur,dep,arr,date,label){
  return '<div class="flight-card">'+
    '<div class="flight-label">'+label+'</div>'+
    '<div class="flight-row">'+
      '<div><div class="airport-code">'+from+'</div><div class="airport-city">'+fromCity+'</div></div>'+
      '<div class="flight-mid"><div class="flight-num">'+fnum+'</div><div class="flight-icon">&#9992;</div><div class="flight-dur">'+dur+'</div></div>'+
      '<div style="text-align:right"><div class="airport-code">'+to+'</div><div class="airport-city">'+toCity+'</div></div>'+
    '</div>'+
    '<div class="flight-footer">'+
      '<span class="flight-time-label">Departs <span class="flight-time-val">'+dep+'</span></span>'+
      '<span class="flight-time-label">'+date+'</span>'+
      '<span class="flight-time-label">Arrives <span class="flight-time-val">'+arr+'</span></span>'+
    '</div>'+
  '</div>';
}

function buildFactsCard(item){
  if(!item||!item.facts||!item.facts.length)return"";
  var html='<div class="facts-card">'+
    '<div class="facts-header"><span class="facts-icon">&#128161;</span>'+
    '<div><div class="facts-title">Did you know?</div><div class="facts-place">'+(item.place||"")+'</div></div></div>'+
    '<div class="reveal-hint">Tap any fact to highlight it &#10024;</div>';
  for(var i=0;i<item.facts.length;i++){
    html+='<div class="fact-item" id="fact-'+i+'" onclick="revealFact('+i+')">'+
      '<div class="fact-num">'+(i+1)+'</div>'+
      '<div class="fact-text">'+item.facts[i]+'</div></div>';
  }
  return html+'</div>';
}

function buildActivityCard(item,nowMins,isCurrent){
  if(!item)return"";
  var isBday=item.type==="birthday";
  var tc=TYPE_CONFIG[item.type]||TYPE_CONFIG.logistics;
  var cardCls=isBday?"birthday-card":(isCurrent?"current-card":"next-card");
  var html='<div class="'+cardCls+'">';
  if(isCurrent){
    html+='<div class="card-label"><span class="'+(isBday?"bpulse":"pulse")+'"></span>'+(isBday?"Happening now — Birthday moment!":"Happening now")+'</div>';
  }else{
    var si=toMins(item.time)-nowMins;
    var ss=si<=1?"starting now":si<60?"in "+si+" min":"in 1 hr";
    html+='<div class="card-label">Up next &middot; '+ss+'</div>';
  }
  html+='<span class="tag '+tc.cls+'">'+tc.label+'</span>';
  html+='<div class="activity-time">'+item.time+' &ndash; '+item.end+'</div>';
  html+='<div class="activity-name">'+item.name+'</div>';
  html+='<div class="activity-desc">'+item.desc+'</div>';
  if(isCurrent){
    var sm=toMins(item.time),em=toMins(item.end);
    var pct=Math.min(100,Math.max(0,Math.round(((nowMins-sm)/(em-sm))*100)));
    var rem=em-nowMins;
    var rs=rem>60?Math.floor(rem/60)+"h "+(rem%60)+"m left":rem+"m left";
    html+='<div class="prog-wrap"><div class="prog-track"><div class="prog-fill" style="width:'+pct+'%"></div></div>'+
      '<div class="prog-labels"><span>'+pct+'% complete</span><span>'+rs+'</span></div></div>';
  }
  return html+'</div>';
}

function buildDinnerCard(todayKey){
  var d=DINNERS[todayKey];
  if(!d)return"";
  var nameHtml=d.mapsUrl
    ? '<a href="'+d.mapsUrl+'" target="_blank">'+d.name+'</a>'
    : d.name;
  var html='<div class="dinner-card">'+
    '<div class="dinner-label">&#127860; Tonight\'s dinner</div>'+
    '<div class="dinner-name">'+nameHtml+'</div>'+
    '<div class="dinner-tagline">'+d.tagline+'</div>'+
    '<div class="dinner-desc">'+d.desc+'</div>'+
    '<div class="dinner-pills">';
  for(var i=0;i<d.pills.length;i++)html+='<span class="dinner-pill">'+d.pills[i]+'</span>';
  html+='</div><div class="dinner-must"><strong>&#127869; Must order:</strong> '+d.must+'</div>';
  if(d.link){
    html+='<a class="dinner-options-link" href="'+d.link+'">&#127860; View all 5 restaurant options &rarr;</a>';
  }
  return html+'</div>';
}

function render(){
  var main=document.getElementById("main");
  if(!main)return;
  var now=getPeruTime();
  var nowMins=now.getHours()*60+now.getMinutes();
  var todayKey=getTodayKey();
  var isBirthday=todayKey==="2026-05-03";
  var av263Depart=new Date("2026-05-01T04:20:00Z");
  var av263Arrive=new Date("2026-05-01T10:30:00Z");
  var av105Depart=new Date("2026-05-01T13:35:00Z");
  var tripStart=new Date("2026-05-01T16:20:00Z");
  var tripEnd=new Date("2026-05-07T05:00:00Z");
  var html="";

  if(now<tripStart){
    var icon,title,desc2,flightHtml,cd;
    if(now<av263Depart){
      cd=fmtCountdown(av263Depart-now);
      icon="&#9992;&#65039;";title="Adventure starts soon!";desc2="Departing O'Hare (ORD) &middot; April 30";
      flightHtml=buildFlightCard("ORD","Chicago O'Hare","BOG","Bogota","AV263","~5h 10m","11:20 PM","~5:30 AM","Apr 30 &middot; Thu","Next flight");
    }else if(now<av263Arrive){
      cd=fmtCountdown(av263Arrive-now);
      icon="&#128747;&#65039;";title="In the air — ORD to BOG";
      var t1=fmtCountdown(av263Arrive-now);
      desc2="AV263 &middot; Landing in Bogota in "+t1.h+"h "+t1.m+"m";
      flightHtml=buildFlightCard("ORD","Chicago O'Hare","BOG","Bogota","AV263","~5h 10m","11:20 PM","~5:30 AM","Apr 30 &rarr; May 1","Currently flying");
    }else if(now<av105Depart){
      cd=fmtCountdown(av105Depart-now);
      icon="&#128748;&#65039;";title="Landed in Bogota!";
      var t2=fmtCountdown(av105Depart-now);
      desc2="Next flight to Cusco departs in "+t2.h+"h "+t2.m+"m";
      flightHtml=buildFlightCard("BOG","Bogota","CUZ","Cusco","AV105","~3h 30m","~8:35 AM","11:20 AM","May 1 &middot; Fri","Next flight — boarding soon");
    }else{
      cd=fmtCountdown(tripStart-now);
      icon="&#128747;&#65039;";title="Almost there — BOG to Cusco!";
      var t3=fmtCountdown(tripStart-now);
      desc2="AV105 &middot; Landing in Cusco in "+t3.h+"h "+t3.m+"m";
      flightHtml=buildFlightCard("BOG","Bogota","CUZ","Cusco","AV105","~3h 30m","~8:35 AM","11:20 AM","May 1 &middot; Fri","Currently flying — almost there!");
    }
    var cdHtml='<div class="cd-grid">'+
      '<div class="cd-cell"><span class="cd-num" id="cd-d">'+cd.d+'</span><span class="cd-unit">days</span></div>'+
      '<div class="cd-cell"><span class="cd-num" id="cd-h">'+cd.h+'</span><span class="cd-unit">hrs</span></div>'+
      '<div class="cd-cell"><span class="cd-num" id="cd-m">'+cd.m+'</span><span class="cd-unit">min</span></div>'+
      '<div class="cd-cell"><span class="cd-num" id="cd-s">'+cd.s+'</span><span class="cd-unit">sec</span></div>'+
    '</div>';
    html='<div class="pre-card">'+
      '<div style="font-size:36px;margin-bottom:12px">'+icon+'</div>'+
      '<div style="font-family:Playfair Display,serif;font-size:20px;color:#C8933A;margin-bottom:8px">'+title+'</div>'+
      '<div style="font-size:13px;color:#9A8E7E;margin-bottom:0">'+desc2+'</div>'+
      cdHtml+flightHtml+
    '</div>';
    main.innerHTML=html;
    return;
  }

  if(now>=tripEnd){
    main.innerHTML='<div class="free-card"><div style="font-size:40px;margin-bottom:16px">&#127968;</div>'+
      '<div style="font-family:Playfair Display,serif;font-size:20px;color:#C8933A;margin-bottom:8px">Back home safely!</div>'+
      '<div style="font-size:13px;color:#9A8E7E;line-height:1.6">What an incredible trip &mdash; Machu Picchu Circuit 2A on a birthday, Peru, and Bogota.<br>Welcome back, family!</div></div>';
    return;
  }

  var items=SCHEDULE[todayKey]||[];
  var currentIdx=-1,nextIdx=-1;
  for(var i=0;i<items.length;i++){
    var s=toMins(items[i].time),e=toMins(items[i].end);
    if(nowMins>=s&&nowMins<e){currentIdx=i;break;}
    if(nowMins<s){nextIdx=i;break;}
  }
  if(currentIdx===-1&&nextIdx===-1)currentIdx=items.length-1;

  var current=currentIdx>=0?items[currentIdx]:null;
  var nextWithinHour=null;
  var checkNext=current?items[currentIdx+1]:(nextIdx>=0?items[nextIdx]:null);
  if(checkNext&&(toMins(checkNext.time)-nowMins)<=60)nextWithinHour=checkNext;

  html='';
  html+='<div class="day-label">'+(DAY_LABELS[todayKey]||todayKey)+'</div>';
  if(isBirthday)html+='<div style="text-align:center;font-size:28px;letter-spacing:4px;margin:-4px 0 4px">&#127874; &#127881; &#127748;</div>';

  if(current){
    html+=buildActivityCard(current,nowMins,true);
    html+=buildFactsCard(current);
  }

  if(nextWithinHour){
    html+=buildActivityCard(nextWithinHour,nowMins,false);
  }else if(current){
    html+='<div class="nothing-card">'+
      '<div style="font-size:24px;margin-bottom:8px">&#127807;</div>'+
      '<div style="font-family:Playfair Display,serif;font-size:16px;color:#9A8E7E;margin-bottom:4px">Nothing in the next hour</div>'+
      '<div style="font-size:13px;color:#5A5040">Enjoy the moment — next activity coming later</div></div>';
  }

  if(!current&&!nextWithinHour){
    html+='<div class="free-card">'+
      '<div style="font-size:36px;margin-bottom:12px">&#127769;</div>'+
      '<div style="font-family:Playfair Display,serif;font-size:20px;color:#C8933A;margin-bottom:8px">Day complete</div>'+
      '<div style="font-size:13px;color:#9A8E7E">All activities for today are done. Rest well!</div></div>';
  }

  html+=buildDinnerCard(todayKey);
  main.innerHTML=html;
}

function updateClock(){
  var now=getPeruTime();
  var el=document.getElementById("clockDisplay");
  var el2=document.getElementById("clockDate");
  if(el)el.textContent=now.toLocaleTimeString("en-US",{hour:"2-digit",minute:"2-digit",hour12:true});
  if(el2)el2.textContent="Lima \u00B7 "+now.toLocaleDateString("en-US",{month:"short",day:"numeric"});
}

function tickCountdown(){
  var now=getPeruTime();
  var av263Depart=new Date("2026-05-01T04:20:00Z");
  var av263Arrive=new Date("2026-05-01T10:30:00Z");
  var av105Depart=new Date("2026-05-01T13:35:00Z");
  var tripStart=new Date("2026-05-01T16:20:00Z");
  if(now>=tripStart)return;
  var target=now<av263Depart?av263Depart:now<av263Arrive?av263Arrive:now<av105Depart?av105Depart:tripStart;
  var cd=fmtCountdown(target-now);
  var d=document.getElementById("cd-d"),h=document.getElementById("cd-h"),m=document.getElementById("cd-m"),s=document.getElementById("cd-s");
  if(d)d.textContent=cd.d;if(h)h.textContent=cd.h;if(m)m.textContent=cd.m;if(s)s.textContent=cd.s;
}


// TIME TRAVEL
var ttMode=false,ttKey=null,ttMins=null;
var ttNames={
  "2026-04-30":"Apr 30 - Departure from Chicago",
  "2026-05-01":"May 1 - Arrival in Peru",
  "2026-05-02":"May 2 - Ticket Day",
  "2026-05-03":"May 3 - Birthday at Machu Picchu",
  "2026-05-04":"May 4 - Sacred Valley",
  "2026-05-05":"May 5 - Departing Peru",
  "2026-05-06":"May 6 - Bogota & Home"
};
function applyTT(){
  var dv=document.getElementById("ttDate").value;
  var tv=document.getElementById("ttTime").value;
  if(!dv){alert("Please pick a day first!");return;}
  var p=tv.split(":");
  ttKey=dv;ttMins=parseInt(p[0])*60+parseInt(p[1]);ttMode=true;
  var h=Math.floor(ttMins/60),m=ttMins%60,ap=h>=12?"PM":"AM",h12=h%12||12;
  var ts=String(h12).padStart(2,"0")+":"+String(m).padStart(2,"0")+" "+ap;
  var b=document.getElementById("ttBanner");
  b.style.display="block";
  b.innerHTML="&#9200; Reliving <strong>"+(ttNames[dv]||dv)+"</strong> at <strong>"+ts+"</strong> Lima time"    +" &nbsp;&mdash;&nbsp; <span style='cursor:pointer;text-decoration:underline' onclick='resetTT()'>Back to live</span>";
  renderTT(ttKey,ttMins);
}
function resetTT(){
  ttMode=false;ttKey=null;ttMins=null;
  document.getElementById("ttBanner").style.display="none";
  document.getElementById("ttDate").value="";
  document.getElementById("ttTime").value="09:00";
  render();
}
function renderTT(dateKey,nowMins){
  var main=document.getElementById("main");
  if(!main)return;
  var isBirthday=dateKey==="2026-05-03";
  var items=SCHEDULE[dateKey]||[];
  var currentIdx=-1,nextIdx=-1;
  for(var i=0;i<items.length;i++){
    var s=toMins(items[i].time),e=toMins(items[i].end);
    if(nowMins>=s&&nowMins<e){currentIdx=i;break;}
    if(nowMins<s){nextIdx=i;break;}
  }
  if(currentIdx===-1&&nextIdx===-1)currentIdx=items.length-1;
  var current=currentIdx>=0?items[currentIdx]:null;
  var nwh=null;
  var cn=current?items[currentIdx+1]:(nextIdx>=0?items[nextIdx]:null);
  if(cn&&(toMins(cn.time)-nowMins)<=60)nwh=cn;
  var html="";
  html+='<div class="day-label">'+(DAY_LABELS[dateKey]||dateKey)+"</div>";
  if(isBirthday)html+='<div style="text-align:center;font-size:28px;letter-spacing:4px;margin:-4px 0 4px">&#127874; &#127881; &#127748;</div>';
  if(current){html+=buildActivityCard(current,nowMins,true);html+=buildFactsCard(current);}
  if(nwh){html+=buildActivityCard(nwh,nowMins,false);}
  else if(current){html+='<div class="nothing-card"><div style="font-size:24px;margin-bottom:8px">&#127807;</div>'
    +'<div style="font-family:Playfair Display,serif;font-size:16px;color:#9A8E7E;margin-bottom:4px">Nothing in the next hour</div>'
    +'<div style="font-size:13px;color:#5A5040">Enjoy the moment</div></div>';}
  if(!current&&!nwh){html+='<div class="free-card"><div style="font-size:36px;margin-bottom:12px">&#127769;</div>'
    +'<div style="font-family:Playfair Display,serif;font-size:20px;color:#C8933A;margin-bottom:8px">Day complete</div>'
    +'<div style="font-size:13px;color:#9A8E7E">All activities done. Rest well!</div></div>';}
  html+=buildDinnerCard(dateKey);
  main.innerHTML=html;
}
updateClock();render();
setInterval(updateClock,1000);
setInterval(tickCountdown,1000);
setInterval(function(){if(!ttMode)render();},60000);
</script>
