<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Peru Trip 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --gold: #C8933A;
    --gold-light: #F5E6C8;
    --dark: #1A1A1A;
    --dark2: #2A2A2A;
    --dark3: #3A3A3A;
    --text: #E8E0D0;
    --text-muted: #9A8E7E;
    --green: #2D6A4F;
    --green-light: #40916C;
    --red: #9B2335;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--dark);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }
  .header {
    background: linear-gradient(135deg, #1A1208 0%, #2A1F0A 50%, #1A1208 100%);
    border-bottom: 1px solid var(--gold);
    padding: 20px 20px 16px;
    text-align: center;
    position: relative;
  }
  .header-top {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    margin-bottom: 4px;
  }
  .header h1 {
    font-family: 'Playfair Display', serif;
    font-size: 22px;
    font-weight: 500;
    color: var(--gold);
    letter-spacing: 0.02em;
  }
  .header-sub {
    font-size: 12px;
    color: var(--text-muted);
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }
  .live-time {
    position: absolute;
    top: 16px;
    right: 16px;
    font-size: 11px;
    color: var(--text-muted);
    font-weight: 300;
    text-align: right;
    line-height: 1.5;
  }
  .tz-note { font-size: 9px; color: #6A5E4E; }
  .main {
    flex: 1;
    padding: 24px 20px;
    max-width: 480px;
    margin: 0 auto;
    width: 100%;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }
  .day-label {
    font-size: 11px;
    font-weight: 500;
    color: var(--text-muted);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    text-align: center;
  }
  .current-card {
    background: linear-gradient(135deg, #1C2E1C, #162816);
    border: 1px solid var(--green-light);
    border-radius: 20px;
    padding: 24px;
    position: relative;
    overflow: hidden;
  }
  .current-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, var(--green), var(--green-light), var(--green));
  }
  .next-card {
    background: var(--dark2);
    border: 1px solid var(--dark3);
    border-radius: 20px;
    padding: 24px;
  }
  .birthday-card {
    background: linear-gradient(135deg, #2A0A18, #1E0812);
    border: 1px solid #7A2040;
    border-radius: 20px;
    padding: 24px;
    position: relative;
    overflow: hidden;
  }
  .birthday-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, #7A2040, #D4537E, #7A2040);
  }
  .card-label {
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    margin-bottom: 14px;
    display: flex;
    align-items: center;
    gap: 7px;
  }
  .current-card .card-label { color: var(--green-light); }
  .next-card .card-label { color: var(--text-muted); }
  .birthday-card .card-label { color: #D4537E; }
  .pulse {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--green-light);
    animation: pulse 2s infinite;
    flex-shrink: 0;
  }
  .bday-pulse {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: #D4537E;
    animation: pulse 2s infinite;
    flex-shrink: 0;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.4; transform: scale(0.8); }
  }
  .tag {
    display: inline-block;
    font-size: 10px;
    padding: 3px 9px;
    border-radius: 99px;
    margin-bottom: 10px;
    font-weight: 500;
    letter-spacing: 0.04em;
    text-transform: uppercase;
  }
  .tag-logistics { background: #1B3A5C; color: #7EC8E3; }
  .tag-morning { background: #3D2B00; color: #FFBC42; }
  .tag-afternoon { background: #0D3328; color: #56D98F; }
  .tag-evening { background: #2A1A40; color: #B09FE8; }
  .tag-birthday { background: #3D0A1E; color: #FF7AAD; }
  .tag-priority { background: #3D0000; color: #FF7070; }
  .activity-time {
    font-size: 12px;
    color: var(--text-muted);
    margin-bottom: 6px;
    font-weight: 300;
  }
  .activity-name {
    font-family: 'Playfair Display', serif;
    font-size: 22px;
    font-weight: 400;
    color: var(--text);
    line-height: 1.3;
    margin-bottom: 10px;
  }
  .birthday-card .activity-name { color: #FFB8D4; }
  .activity-desc {
    font-size: 13px;
    color: var(--text-muted);
    line-height: 1.7;
    font-weight: 300;
  }
  .progress-wrap { margin-top: 16px; }
  .progress-bar {
    height: 3px;
    background: rgba(255,255,255,0.08);
    border-radius: 99px;
    overflow: hidden;
    margin-bottom: 6px;
  }
  .progress-fill {
    height: 100%;
    background: var(--green-light);
    border-radius: 99px;
    transition: width 30s linear;
  }
  .progress-label {
    display: flex;
    justify-content: space-between;
    font-size: 11px;
    color: var(--text-muted);
  }
  .starts-in {
    display: inline-block;
    background: rgba(255,255,255,0.05);
    border: 1px solid var(--dark3);
    border-radius: 99px;
    padding: 4px 12px;
    font-size: 11px;
    color: var(--text-muted);
    margin-bottom: 10px;
  }
  .free-card {
    background: var(--dark2);
    border: 1px solid var(--dark3);
    border-radius: 20px;
    padding: 40px 24px;
    text-align: center;
  }
  .free-icon {
    font-size: 40px;
    margin-bottom: 16px;
  }
  .free-title {
    font-family: 'Playfair Display', serif;
    font-size: 20px;
    color: var(--gold);
    margin-bottom: 8px;
  }
  .free-sub {
    font-size: 13px;
    color: var(--text-muted);
    line-height: 1.6;
  }
  .pre-trip-card {
    background: var(--dark2);
    border: 1px solid var(--dark3);
    border-radius: 20px;
    padding: 40px 24px;
    text-align: center;
  }
  .pre-trip-icon { font-size: 40px; margin-bottom: 16px; }
  .pre-trip-title {
    font-family: 'Playfair Display', serif;
    font-size: 20px;
    color: var(--gold);
    margin-bottom: 8px;
  }
  .pre-trip-sub { font-size: 13px; color: var(--text-muted); line-height: 1.6; }
  .countdown-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 8px;
    margin: 16px 0;
  }
  .countdown-cell {
    background: #1F1A10;
    border: 1px solid #3A3020;
    border-radius: 10px;
    padding: 10px 4px;
    text-align: center;
  }
  .countdown-num {
    font-family: 'Playfair Display', serif;
    font-size: 24px;
    color: var(--gold);
    display: block;
  }
  .countdown-unit {
    font-size: 10px;
    color: var(--text-muted);
    letter-spacing: 0.06em;
    text-transform: uppercase;
  }
  .emergency-card {
    background: linear-gradient(135deg, #1A0A0A, #200D0D);
    border: 1px solid #4A1515;
    border-radius: 16px;
    padding: 16px 20px;
  }
  .emergency-title {
    font-size: 10px;
    color: #FF7070;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    font-weight: 500;
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .em-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 8px 0;
    border-bottom: 1px solid #2A1515;
    gap: 12px;
  }
  .em-row:last-child { border-bottom: none; padding-bottom: 0; }
  .em-label { font-size: 12px; color: #8A6060; flex: 1; }
  .em-val { font-size: 12px; color: var(--text); text-align: right; }
  .em-val a { color: #FF9090; text-decoration: none; }
  .footer { text-align: center; padding: 8px 0 20px; font-size: 11px; color: #3A3228; }
</style>
</head>
<body>

<div class="header">
  <div class="live-time" id="liveTime">
    <span id="clockDisplay">--:-- --</span>
    <div class="tz-note" id="clockDate">Lima time</div>
  </div>
  <div class="header-top">
    
    <h1>Peru Trip 2026</h1>
    
  </div>
  <div class="header-sub">May 1–6, 2026</div>
</div>

<div class="main" id="main"></div>

<script>
const SCHEDULE = {
  '2026-05-01': [
    { time:'11:20', end:'12:30', name:'Land at Cusco Airport', desc:'TreXperience driver waiting at arrivals. Clear immigration + collect bags (~75 min).', type:'logistics' },
    { time:'12:30', end:'15:07', name:'Drive to Ollantaytambo', desc:'Private van ~1.5 hrs. Drop checked bag at PeruRail free storage. Quick lunch in town.', type:'logistics' },
    { time:'15:07', end:'15:37', name:'Board train at Ollantaytambo', desc:'PeruRail Vistadome Observatory 603. Be on the platform 30 min before departure.', type:'logistics' },
    { time:'15:37', end:'17:02', name:'Train to Aguas Calientes', desc:'Panoramic cloud forest journey. Arrives Machu Picchu Pueblo station 17:02.', type:'afternoon' },
    { time:'17:02', end:'18:30', name:'Arrive & check in — Casa Andina', desc:'Ask hotel about Ministry of Culture opening time tomorrow. Request early May 3 breakfast.', type:'logistics' },
    { time:'18:30', end:'19:30', name:'Ministry of Culture — Chance #1', desc:'Check if office still open on Av. Pachacutec. If open, buy Circuit 2 tickets for May 3 now.', type:'priority' },
    { time:'19:30', end:'21:00', name:'Dinner — TUNAWA Andean Fusion', desc:'Rated 4.8. Laguna ceviche, pollo saltado. 5-min walk from plaza. Early night!', type:'evening' },
    { time:'21:00', end:'23:59', name:'Sleep — alarm set for 5:30am', desc:'Lower altitude means great sleep for everyone.', type:'logistics' },
  ],
  '2026-05-02': [
    { time:'05:00', end:'05:30', name:'Guide meets at hotel', desc:'TreXperience guide accompanies family to the Ministry of Culture queue.', type:'priority' },
    { time:'05:30', end:'07:00', name:'Queue — Ministry of Culture', desc:'All 3 family members with passports. Token distribution starts at 6am on Av. Pachacutec.', type:'priority' },
    { time:'07:00', end:'09:00', name:'Hotel breakfast', desc:'Tokens secured! Eat well. Build excitement with the kid for tomorrow at Machu Picchu.', type:'morning' },
    { time:'09:00', end:'12:30', name:'Waterfalls — Mandor or Alcamayo', desc:'Option A: Mandor sanctuary (45-min walk along tracks). Option B: Alcamayo pools (20-min walk).', type:'morning' },
    { time:'12:30', end:'14:00', name:'Lunch — Ayahuasca Grill', desc:'Rated 4.9. Walk uphill away from tourist strip. Best trout and chicken in Aguas Calientes.', type:'afternoon' },
    { time:'14:00', end:'14:45', name:'Thermal baths', desc:'Pre-Machu Picchu soak. ~15 soles. Bring towel + flip-flops. Go 2–3pm when crowds clear.', type:'afternoon' },
    { time:'14:45', end:'16:30', name:'⚠️ Return — Ministry of Culture 3pm', desc:'BE THERE BY 2:45PM SHARP. Tickets on sale at 3pm. Pay EXACT soles cash — no change given.', type:'priority' },
    { time:'16:30', end:'19:00', name:'Town stroll + artisan market', desc:'Manco Capac Square. Buy kid a Machu Picchu souvenir to build tomorrow\'s excitement.', type:'afternoon' },
    { time:'19:00', end:'20:30', name:'Dinner — Mistura restaurant', desc:'Rated 4.7. River views. Mention tomorrow is a birthday! Pack bags tonight for 4:30am start.', type:'evening' },
    { time:'20:30', end:'23:59', name:'Sleep — alarm set for 4:30am', desc:'The first bus gets you on the mountain at sunrise. That is the moment you came for.', type:'logistics' },
  ],
  '2026-05-03': [
    { time:'04:30', end:'05:15', name:'Wake up + breakfast', desc:'Full breakfast — protein and carbs. Pack: 1L water each, snacks, sunscreen, rain jacket, passports, tickets.', type:'logistics' },
    { time:'05:15', end:'06:00', name:'Consettur bus queue', desc:'Join queue by 5:15am. Buy round-trip bus tickets (~$24/adult). 20-min drive up the mountain.', type:'logistics' },
    { time:'06:00', end:'09:30', name:'🎂 Enter Machu Picchu — Birthday!', desc:'Sunrise mist over the terraces. Golden light on Huayna Picchu. Llamas everywhere. TreXperience guide with Inca treasure hunt for the 8-year-old.', type:'birthday' },
    { time:'09:30', end:'10:30', name:'Free time inside the citadel', desc:'Sit, breathe, let the kid explore near the llamas. No re-entry once you exit — plan bathroom breaks.', type:'afternoon' },
    { time:'10:30', end:'12:00', name:'Bus back to Aguas Calientes', desc:'Return to Casa Andina. Shower and change. Leave main bags at reception for storage.', type:'logistics' },
    { time:'12:00', end:'14:00', name:'Thermal baths — birthday recovery', desc:'Sore legs, happy hearts. 15 soles. Kid splashes, adults decompress. Best feeling of the trip.', type:'birthday' },
    { time:'14:00', end:'19:30', name:'Return train + taxi to Cusco', desc:'Pick up stored bags from Casa Andina reception. Board return train. TreXperience private taxi waiting at Ollantaytambo to drive to Cusco (~1.5 hrs).', type:'logistics' },
    { time:'19:30', end:'20:30', name:'Arrive Cusco + hotel check-in', desc:'TreXperience driver drops at Cusco hotel. Freshen up for the birthday dinner.', type:'logistics' },
    { time:'20:30', end:'22:30', name:'🎂 Birthday dinner — Morena Kitchen', desc:'Window table overlooking illuminated Plaza de Armas. Birthday decoration on the table. Reserved.', type:'birthday' },
  ],
  '2026-05-04': [
    { time:'08:30', end:'09:30', name:'Hotel breakfast — slow morning', desc:'Earned rest after Machu Picchu. No rush today.', type:'morning' },
    { time:'09:30', end:'11:30', name:'Qorikancha — Temple of the Sun', desc:'Sacred Inca temple fused with a Spanish church. 20 soles. Panoramic tower view included.', type:'morning' },
    { time:'11:30', end:'13:30', name:'Sacsayhuaman fortress', desc:'300-ton stones above Cusco. Kids love the rock formations. 10-min taxi from Qorikancha.', type:'morning' },
    { time:'13:30', end:'15:00', name:'Lunch — KUSYKAY', desc:'Rated 4.9 · 10,000+ reviews · steps from Plaza de Armas. Trucha andina + chicken tacos.', type:'afternoon' },
    { time:'15:00', end:'17:30', name:'San Pedro Market + San Blas', desc:'Local market and cobblestone neighborhood. Alpaca wool souvenirs. City viewpoint.', type:'afternoon' },
    { time:'17:30', end:'19:30', name:'Optional: Hotel spa', desc:'Birthday extension massage. Book through the hotel the night before.', type:'afternoon' },
    { time:'19:30', end:'21:30', name:'Farewell dinner — Chull\'s', desc:'Rated 4.9. Ají de gallina (creamy chicken stew). Chicha Morada for the kid.', type:'evening' },
  ],
  '2026-05-05': [
    { time:'09:00', end:'12:00', name:'Hotel breakfast + last Cusco morning', desc:'Check out by 12pm. Last coffee, final stroll around Plaza de Armas.', type:'morning' },
    { time:'12:00', end:'14:00', name:'Relax + last Cusco stroll', desc:'Bags stored at hotel. Light lunch near Plaza de Armas. Last look at Cusco — soak it all in.', type:'afternoon' },
    { time:'14:00', end:'17:10', name:'Head to Cusco Airport (CUZ)', desc:'Arrive 3 hrs before departure. AV104 check-in. Last look at the Andes!', type:'logistics' },
    { time:'17:10', end:'20:00', name:'AV104 — Cusco to Bogota', desc:'Departs 5:10pm. ~3.5 hr flight. Arrives El Dorado International Airport ~8pm.', type:'logistics' },
    { time:'20:00', end:'22:00', name:'Arrive Bogota + Hilton Garden Inn', desc:'Call hotel from arrivals for the free airport shuttle. Check in. Spa whirlpool open late.', type:'logistics' },
  ],
  '2026-05-06': [
    { time:'08:00', end:'09:00', name:'Breakfast + leave bags at hotel', desc:'All luggage stored at reception. Light daypack only. ~6 hrs in the city.', type:'morning' },
    { time:'09:00', end:'11:30', name:'Monserrate cable car', desc:'Panoramic Bogota views from 3,150m. Priority pass purchased. Cable car up, funicular down.', type:'morning' },
    { time:'11:30', end:'12:00', name:'Travel to La Candelaria', desc:'Uber from Monserrate to the historic district (~20 min). Good time to grab a quick snack.', type:'logistics' },
    { time:'12:00', end:'14:30', name:'La Candelaria historic district', desc:'Colonial streets, Bolivar Plaza, Chorro de Quevedo. Street performers, chicha vendors.', type:'afternoon' },
    { time:'14:30', end:'17:00', name:'Return to hotel + collect bags', desc:'Uber back to Hilton. Collect luggage. Head to El Dorado airport.', type:'logistics' },
    { time:'17:00', end:'20:00', name:'El Dorado Airport — AV262', desc:'Arrive 3 hrs before departure. Buy Colombian coffee at duty-free!', type:'logistics' },
    { time:'20:00', end:'23:59', name:'AV262 — Bogota to Chicago (ORD)', desc:'Homebound. Trip complete — Machu Picchu on a birthday, Peru + Bogota. Unforgettable.', type:'logistics' },
  ],
};

const TYPE_CONFIG = {
  logistics: { label:'Transit', cls:'tag-logistics' },
  morning:   { label:'Morning', cls:'tag-morning' },
  afternoon: { label:'Afternoon', cls:'tag-afternoon' },
  evening:   { label:'Evening', cls:'tag-evening' },
  birthday:  { label:'🎂 Birthday', cls:'tag-birthday' },
  priority:  { label:'⚠️ Priority', cls:'tag-priority' },
};

const DAY_LABELS = {
  '2026-05-01':'Day 1 — Arrival in Peru',
  '2026-05-02':'Day 2 — Ticket Day, Aguas Calientes',
  '2026-05-03':'Day 3 — Machu Picchu Birthday',
  '2026-05-04':'Day 4 — Cusco Exploration',
  '2026-05-05':'Day 5 — Departing Peru',
  '2026-05-06':'Day 6 — Bogota & Home',
};

function getPeruTime() {
  return new Date(new Date().toLocaleString('en-US', { timeZone: 'America/Lima' }));
}

function toMins(t) {
  const [h,m] = t.split(':').map(Number);
  return h*60+m;
}

function fmtCountdown(ms) {
  const s = Math.floor(ms/1000);
  const d = Math.floor(s/86400);
  const h = Math.floor((s%86400)/3600);
  const m = Math.floor((s%3600)/60);
  const sc = s%60;
  return {d,h,m,s:sc};
}

function updateClock() {
  const now = getPeruTime();
  const timeStr = now.toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit',hour12:true});
  const dateStr = now.toLocaleDateString('en-US',{month:'short',day:'numeric'});
  document.getElementById('clockDisplay').textContent = timeStr;
  document.getElementById('clockDate').textContent = `Lima · ${dateStr}`;
}

function getTodayKey() {
  const now = getPeruTime();
  const y = now.getFullYear();
  const m = String(now.getMonth()+1).padStart(2,'0');
  const d = String(now.getDate()).padStart(2,'0');
  return `${y}-${m}-${d}`;
}

function render() {
  const main = document.getElementById('main');
  const todayKey = getTodayKey();
  const now = getPeruTime();
  const nowMins = now.getHours()*60 + now.getMinutes();

  const tripStart = new Date('2026-05-01T11:20:00-05:00');
  const tripEnd = new Date('2026-05-07T00:00:00-05:00');

  if (now < tripStart) {
    const diff = tripStart - now;
    const cd = fmtCountdown(diff);
    main.innerHTML = `
      <div class="pre-trip-card">
        <div class="pre-trip-icon">✈️</div>
        <div class="pre-trip-title">Adventure starts soon!</div>
        <div class="pre-trip-sub" style="margin-bottom:16px" id="departSub">Departing O'Hare (ORD) · April 30</div>
        <div class="countdown-grid">
          <div class="countdown-cell"><span class="countdown-num" id="cd-d">${cd.d}</span><span class="countdown-unit">days</span></div>
          <div class="countdown-cell"><span class="countdown-num" id="cd-h">${cd.h}</span><span class="countdown-unit">hrs</span></div>
          <div class="countdown-cell"><span class="countdown-num" id="cd-m">${cd.m}</span><span class="countdown-unit">min</span></div>
          <div class="countdown-cell"><span class="countdown-num" id="cd-s">${cd.s}</span><span class="countdown-unit">sec</span></div>
        </div>
      </div>
      ${emergencyHTML()}
    `;
    return;
  }

  if (now >= tripEnd) {
    main.innerHTML = `
      <div class="free-card">
        <div class="free-icon">🏡</div>
        <div class="free-title">Back home safely!</div>
        <div class="free-sub">What an incredible trip — Machu Picchu on a birthday, Peru, and Bogota.<br>Welcome back, family!</div>
      </div>
    `;
    return;
  }

  const items = SCHEDULE[todayKey] || [];
  const dayLabel = DAY_LABELS[todayKey] || '';
  const isBirthday = todayKey === '2026-05-03';

  let currentIdx = -1;
  let nextIdx = -1;

  for (let i = 0; i < items.length; i++) {
    const s = toMins(items[i].time);
    const e = toMins(items[i].end);
    if (nowMins >= s && nowMins < e) { currentIdx = i; break; }
    if (nowMins < s) { nextIdx = i; break; }
  }

  if (currentIdx === -1 && nextIdx === -1) {
    currentIdx = items.length - 1;
  }

  const current = currentIdx >= 0 ? items[currentIdx] : null;

  let nextWithinHour = null;
  if (current !== null && currentIdx + 1 < items.length) {
    const candidate = items[currentIdx + 1];
    const candStart = toMins(candidate.time);
    if (candStart - nowMins <= 60) {
      nextWithinHour = candidate;
    }
  } else if (nextIdx >= 0) {
    const candidate = items[nextIdx];
    const candStart = toMins(candidate.time);
    if (candStart - nowMins <= 60) {
      nextWithinHour = candidate;
    }
  }

  let html = `<div class="day-label">${dayLabel}</div>`;

  if (isBirthday) {
    html += `<div style="text-align:center;font-size:28px;letter-spacing:4px;margin:-4px 0 4px">🎂 🎉 🌄</div>`;
  }

  if (current) {
    const isBday = current.type === 'birthday';
    const cardCls = isBday ? 'birthday-card' : 'current-card';
    const tc = TYPE_CONFIG[current.type] || TYPE_CONFIG.logistics;
    const startMins = toMins(current.time);
    const endMins = toMins(current.end);
    const dur = endMins - startMins;
    const elapsed = nowMins - startMins;
    const pct = Math.min(100, Math.max(0, Math.round((elapsed/dur)*100)));
    const rem = endMins - nowMins;
    const remStr = rem > 60 ? `${Math.floor(rem/60)}h ${rem%60}m left` : `${rem}m left`;

    html += `<div class="${cardCls}">
      <div class="card-label">
        <span class="${isBday ? 'bday-pulse' : 'pulse'}"></span>
        ${isBday ? 'Happening now — Birthday moment!' : 'Happening now'}
      </div>
      <span class="tag ${tc.cls}">${tc.label}</span>
      <div class="activity-time">${current.time} – ${current.end}</div>
      <div class="activity-name">${current.name}</div>
      <div class="activity-desc">${current.desc}</div>
      <div class="progress-wrap">
        <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
        <div class="progress-label"><span>${pct}% complete</span><span>${remStr}</span></div>
      </div>
    </div>`;
  }

  if (nextWithinHour) {
    const tc = TYPE_CONFIG[nextWithinHour.type] || TYPE_CONFIG.logistics;
    const startsIn = toMins(nextWithinHour.time) - nowMins;
    const startsStr = startsIn <= 1 ? 'starting now' : startsIn < 60 ? `in ${startsIn} min` : 'in 1 hr';
    html += `<div class="next-card">
      <div class="card-label">Up next · ${startsStr}</div>
      <span class="tag ${tc.cls}">${tc.label}</span>
      <div class="activity-time">${nextWithinHour.time} – ${nextWithinHour.end}</div>
      <div class="activity-name">${nextWithinHour.name}</div>
      <div class="activity-desc">${nextWithinHour.desc}</div>
    </div>`;
  } else if (current) {
    html += `<div class="next-card" style="text-align:center;padding:28px 24px">
      <div style="font-size:22px;margin-bottom:8px">🌿</div>
      <div style="font-family:'Playfair Display',serif;font-size:16px;color:var(--gold);margin-bottom:6px">Nothing in the next hour</div>
      <div style="font-size:13px;color:var(--text-muted)">Enjoy the moment — next activity coming later.</div>
    </div>`;
  }

  if (!current && !nextWithinHour) {
    html += `<div class="free-card">
      <div class="free-icon">🌙</div>
      <div class="free-title">Day complete</div>
      <div class="free-sub">All activities for today are done. Rest well!</div>
    </div>`;
  }

  html += emergencyHTML();
  main.innerHTML = html;
}

function emergencyHTML() { return ''; }

updateClock();
render();
setInterval(updateClock, 1000);
setInterval(render, 60000);

function updateDepartSub() {
  const el = document.getElementById('departSub');
  if (!el) return;
  const now = getPeruTime();
  const landing = new Date('2026-05-01T11:20:00-05:00');
  const depart = new Date('2026-04-30T23:20:00-05:00');
  const diffMs = landing - now;
  const diffHrs = diffMs / (1000 * 60 * 60);
  if (now >= depart && diffHrs <= 4 && diffHrs > 0) {
    const mins = Math.round(diffMs / 60000);
    const hrs = Math.floor(mins / 60);
    const remMins = mins % 60;
    const timeStr = hrs > 0 ? `${hrs}h ${remMins}m` : `${remMins}m`;
    el.innerHTML = `✈️ Landing in Cusco in <strong style="color:var(--gold)">${timeStr}</strong>`;
  } else if (diffHrs > 4) {
    el.textContent = "Departing O'Hare (ORD) · April 30";
  }
}
setInterval(updateDepartSub, 30000);
updateDepartSub();

setInterval(() => {
  const now = getPeruTime();
  const tripStart = new Date('2026-05-01T11:20:00-05:00');
  if (now < tripStart) {
    const diff = tripStart - now;
    const cd = fmtCountdown(diff);
    const d = document.getElementById('cd-d');
    const h = document.getElementById('cd-h');
    const m = document.getElementById('cd-m');
    const s = document.getElementById('cd-s');
    if(d) d.textContent = cd.d;
    if(h) h.textContent = cd.h;
    if(m) m.textContent = cd.m;
    if(s) s.textContent = cd.s;
  }
}, 1000);
</script>
</body>
