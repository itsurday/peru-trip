<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Peru Trip — Tester</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0d0d1a;--surface:#161628;--surface2:#1e1e35;--border:rgba(255,255,255,.1);
  --gold:#f5a623;--pink:#e94560;--green:#40c97a;--purple:#a78bfa;
  --text:#f0eeff;--muted:rgba(240,238,255,.5);--dim:rgba(240,238,255,.25);
}
body{background:var(--bg);color:var(--text);font-family:'Nunito',sans-serif;min-height:100vh;overflow-x:hidden}

/* ── HEADER ── */
.hero{
  background:linear-gradient(135deg,#1a0533,#0d1a3a,#0a2a1a);
  padding:22px 20px 18px;text-align:center;position:relative;overflow:hidden;
  border-bottom:1px solid rgba(245,166,35,.3)
}
.hero-glow{position:absolute;width:300px;height:300px;border-radius:50%;
  background:radial-gradient(circle,rgba(233,69,96,.2),transparent 70%);
  top:-100px;left:50%;transform:translateX(-50%);pointer-events:none}
.hero h1{font-family:'Fredoka One',cursive;font-size:26px;color:var(--gold);
  text-shadow:0 0 30px rgba(245,166,35,.4);position:relative;z-index:1}
.hero p{font-size:12px;color:var(--muted);margin-top:3px;position:relative;z-index:1}

/* ── TIME MACHINE ── */
.machine{
  margin:20px 16px;
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:24px;
  overflow:hidden;
}
.machine-header{
  background:linear-gradient(135deg,rgba(233,69,96,.15),rgba(167,139,250,.15));
  padding:14px 20px;
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;gap:10px;
}
.machine-header .mh-icon{font-size:22px}
.machine-header .mh-title{font-family:'Fredoka One',cursive;font-size:16px;color:var(--gold)}
.machine-header .mh-sub{font-size:11px;color:var(--muted);margin-top:1px}

/* day pills */
.day-strip{display:flex;gap:0;overflow-x:auto;scrollbar-width:none;border-bottom:1px solid var(--border)}
.day-strip::-webkit-scrollbar{display:none}
.day-pill{
  flex-shrink:0;padding:10px 16px;font-size:12px;font-weight:700;
  color:var(--muted);cursor:pointer;border-right:1px solid var(--border);
  transition:all .2s;white-space:nowrap;text-align:center;line-height:1.3;
  background:transparent;border-top:none;border-left:none;border-bottom:none;
}
.day-pill:last-child{border-right:none}
.day-pill.active{background:linear-gradient(135deg,rgba(233,69,96,.2),rgba(245,166,35,.2));color:var(--gold)}
.day-pill .dp-date{font-size:10px;color:var(--dim);display:block;font-weight:400}
.day-pill.active .dp-date{color:var(--muted)}

/* time scrubber */
.time-zone{padding:18px 20px 20px}
.time-label{font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:12px;display:flex;align-items:center;gap:6px}
.time-display{
  font-family:'Fredoka One',cursive;font-size:52px;color:var(--gold);
  text-align:center;margin:8px 0 16px;line-height:1;
  text-shadow:0 0 40px rgba(245,166,35,.3);
  letter-spacing:2px;
}
.time-display .ampm{font-size:22px;color:var(--muted);margin-left:4px}
.scrubber{
  -webkit-appearance:none;width:100%;height:6px;border-radius:99px;
  background:linear-gradient(90deg,var(--pink),var(--gold),var(--green));
  outline:none;cursor:pointer;margin-bottom:8px;
}
.scrubber::-webkit-slider-thumb{
  -webkit-appearance:none;width:22px;height:22px;border-radius:50%;
  background:#fff;box-shadow:0 0 12px rgba(245,166,35,.6);cursor:pointer;
}
.scrubber::-moz-range-thumb{
  width:22px;height:22px;border-radius:50%;
  background:#fff;box-shadow:0 0 12px rgba(245,166,35,.6);cursor:pointer;border:none;
}
.time-ticks{display:flex;justify-content:space-between;font-size:10px;color:var(--dim);padding:0 2px}
.quick-btns{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-top:12px}
.qbtn{
  background:var(--surface2);border:1px solid var(--border);
  border-radius:10px;padding:8px 4px;font-size:11px;font-weight:700;
  color:var(--muted);cursor:pointer;text-align:center;transition:all .15s;
  font-family:'Nunito',sans-serif;
}
.qbtn:hover{background:rgba(245,166,35,.1);border-color:rgba(245,166,35,.4);color:var(--gold)}
.qbtn .qt{font-size:9px;color:var(--dim);display:block;margin-top:1px;font-weight:400}

/* now btn */
.now-btn{
  display:block;width:calc(100% - 40px);margin:0 20px 20px;
  background:linear-gradient(135deg,var(--pink),var(--gold));
  border:none;border-radius:14px;color:#fff;
  font-family:'Fredoka One',cursive;font-size:18px;
  padding:13px;cursor:pointer;letter-spacing:.04em;
  box-shadow:0 4px 20px rgba(233,69,96,.3);
  transition:transform .1s,box-shadow .1s;
}
.now-btn:active{transform:scale(.97);box-shadow:0 2px 10px rgba(233,69,96,.2)}

/* ── RESULT ── */
.result{padding:0 16px 32px;display:flex;flex-direction:column;gap:14px}

/* simulated time pill */
.sim-pill{
  background:rgba(245,166,35,.1);border:1px solid rgba(245,166,35,.3);
  border-radius:12px;padding:10px 16px;font-size:13px;color:var(--gold);
  text-align:center;display:none;font-weight:600;
}
.sim-pill.show{display:block}

/* cards */
.c-card{border-radius:20px;padding:22px;position:relative;overflow:hidden}
.c-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px}
.c-current{background:linear-gradient(135deg,rgba(32,96,64,.6),rgba(22,66,44,.8));border:1.5px solid #40916C}
.c-current::before{background:linear-gradient(90deg,#2D6A4F,#56D98F,#2D6A4F)}
.c-next{background:var(--surface);border:1px solid var(--border)}
.c-birthday{background:linear-gradient(135deg,rgba(180,20,80,.4),rgba(120,10,50,.6));border:1.5px solid #D4537E}
.c-birthday::before{background:linear-gradient(90deg,#7A2040,#ff9ec4,#D4537E,#ff9ec4,#7A2040)}
.c-nothing{background:var(--surface);border:1px dashed var(--border);border-radius:20px;padding:30px 22px;text-align:center}
.c-free{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:36px 22px;text-align:center}

.card-label{font-size:10px;font-weight:800;letter-spacing:.14em;text-transform:uppercase;
  margin-bottom:12px;display:flex;align-items:center;gap:6px;color:#56D98F}
.c-birthday .card-label{color:#ff9ec4}
.c-next .card-label{color:var(--muted)}
.pulse{width:7px;height:7px;border-radius:50%;background:#56D98F;animation:pulse 1.5s infinite;flex-shrink:0}
.bpulse{width:7px;height:7px;border-radius:50%;background:#D4537E;animation:pulse 1.5s infinite;flex-shrink:0}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.3;transform:scale(.6)}}
.tag{display:inline-block;font-size:10px;padding:3px 10px;border-radius:99px;
  margin-bottom:8px;font-weight:800;letter-spacing:.06em;text-transform:uppercase}
.tag-logistics{background:rgba(27,58,92,.8);color:#7EC8E3}
.tag-morning{background:rgba(61,43,0,.8);color:#FFBC42}
.tag-afternoon{background:rgba(13,51,40,.8);color:#56D98F}
.tag-evening{background:rgba(42,26,64,.8);color:#C8B0F0}
.tag-birthday{background:rgba(80,10,40,.8);color:#ff9ec4}
.tag-priority{background:rgba(80,0,0,.8);color:#FF7070}
.act-time{font-size:11px;color:var(--muted);margin-bottom:4px;font-weight:600}
.act-name{font-family:'Fredoka One',cursive;font-size:21px;line-height:1.3;margin-bottom:8px}
.c-birthday .act-name{color:#FFB8D4}
.act-desc{font-size:13px;color:var(--muted);line-height:1.7}
.prog-wrap{margin-top:14px}
.prog-track{height:6px;background:rgba(255,255,255,.08);border-radius:99px;overflow:hidden;margin-bottom:5px}
.prog-fill{height:100%;background:linear-gradient(90deg,#40916C,#56D98F);border-radius:99px}
.prog-labels{display:flex;justify-content:space-between;font-size:11px;color:var(--muted)}
.pre-box{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:36px 22px;text-align:center}
.pre-title{font-family:'Fredoka One',cursive;font-size:24px;color:var(--gold);margin:12px 0 6px}
.pre-sub{font-size:13px;color:var(--muted);margin-bottom:16px}
.cd-row{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
.cd-cell{background:rgba(245,166,35,.08);border:1px solid rgba(245,166,35,.2);border-radius:12px;padding:10px 4px;text-align:center}
.cd-num{font-family:'Fredoka One',cursive;font-size:28px;color:var(--gold);display:block}
.cd-unit{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.06em}
.llama{font-size:50px;display:block;animation:bounce 2s infinite}
@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-12px)}}

/* confetti */
.confetti-layer{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:999}
.sparkle{position:absolute;animation:fall linear forwards}
@keyframes fall{0%{transform:translateY(-20px) rotate(0deg);opacity:1}100%{transform:translateY(100vh) rotate(540deg);opacity:0}}

.facts-card{background:rgba(245,166,35,.06);border:1px solid rgba(245,166,35,.2);border-radius:16px;padding:18px 20px}
.facts-header{display:flex;align-items:center;gap:8px;margin-bottom:14px}
.facts-icon{font-size:18px}
.facts-title{font-size:11px;font-weight:800;letter-spacing:.1em;text-transform:uppercase;color:var(--gold)}
.facts-place{font-size:12px;color:var(--muted);margin-top:1px}
.fact-item{display:flex;gap:10px;margin-bottom:10px;align-items:flex-start;cursor:pointer;transition:all .2s}
.fact-item:last-child{margin-bottom:0}
.fact-num{width:24px;height:24px;border-radius:50%;background:rgba(245,166,35,.1);border:1px solid rgba(245,166,35,.3);
  font-size:10px;font-weight:800;color:var(--gold);display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px;transition:all .2s}
.fact-text{font-size:13px;color:var(--muted);line-height:1.6;flex:1;transition:all .2s}
.fact-item.revealed .fact-num{background:var(--gold);color:#0d0d1a}
.fact-item.revealed .fact-text{color:var(--text)}
.reveal-hint{font-size:11px;color:var(--dim);text-align:center;margin-top:10px;font-style:italic}
</style>
</head>
<body>
<div class="confetti-layer" id="confetti"></div>

<div class="hero">
  <div class="hero-glow"></div>
  <h1>🏔️ Peru Trip Tester 🦙</h1>
  <p>Simulate any day & time — preview exactly what the tracker shows</p>
</div>

<div class="machine">
  <div class="machine-header">
    <span class="mh-icon">⏰</span>
    <div>
      <div class="mh-title">Time Machine</div>
      <div class="mh-sub">Pick a day, drag the slider, see what happens</div>
    </div>
  </div>

  <!-- Day pills -->
  <div class="day-strip" id="dayStrip"></div>

  <!-- Time scrubber -->
  <div class="time-zone">
    <div class="time-label">🕐 Time (Lima / Peru)</div>
    <div class="time-display" id="timeDisplay">12:00 <span class="ampm">PM</span></div>
    <input type="range" class="scrubber" id="scrubber" min="0" max="1439" value="720" step="5">
    <div class="time-ticks">
      <span>12am</span><span>6am</span><span>12pm</span><span>6pm</span><span>11pm</span>
    </div>
    <div class="quick-btns" id="quickBtns"></div>
  </div>

  <button class="now-btn" onclick="snapToNow()">📍 Snap to Lima time right now</button>
</div>

<div class="sim-pill" id="simPill"></div>
<div class="result" id="result"></div>

<script src="events.js"></script>
<script>
const DAYS = [
  { key:'pre',      label:'Pre-trip',  sub:'Apr 29',  mins:720  },
  { key:'2026-05-01', label:'Day 1',   sub:'May 1',   mins:720  },
  { key:'2026-05-02', label:'Day 2',   sub:'May 2',   mins:500  },
  { key:'2026-05-03', label:'🎂 Day 3',sub:'May 3',   mins:360  },
  { key:'2026-05-04', label:'Day 4',   sub:'May 4',   mins:570  },
  { key:'2026-05-05', label:'Day 5',   sub:'May 5',   mins:540  },
  { key:'2026-05-06', label:'Day 6',   sub:'May 6',   mins:540  },
  { key:'post',     label:'Home!',     sub:'May 7',   mins:720  },
];

let selDay = '2026-05-01';
let scrubMins = 720;

// Build day pills
const strip = document.getElementById('dayStrip');
DAYS.forEach(d => {
  const btn = document.createElement('button');
  btn.className = 'day-pill' + (d.key === selDay ? ' active' : '');
  btn.innerHTML = `${d.label}<span class="dp-date">${d.sub}</span>`;
  btn.onclick = () => {
    selDay = d.key;
    scrubMins = d.mins;
    document.getElementById('scrubber').value = scrubMins;
    strip.querySelectorAll('.day-pill').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    updateTimeDisplay();
    simulate();
  };
  strip.appendChild(btn);
});

// Quick time buttons
const QUICK = [
  { label:'5:00 AM', t:300, note:'Machu Picchu' },
  { label:'6:00 AM', t:360, note:'MP entry' },
  { label:'9:00 AM', t:540, note:'Morning' },
  { label:'12:00 PM', t:720, note:'Lunchtime' },
  { label:'2:45 PM', t:885, note:'MoC return' },
  { label:'3:00 PM', t:900, note:'MoC tickets' },
  { label:'7:00 PM', t:1140, note:'Dinner' },
  { label:'9:00 PM', t:1260, note:'Night' },
];
const qb = document.getElementById('quickBtns');
QUICK.forEach(q => {
  const btn = document.createElement('button');
  btn.className = 'qbtn';
  btn.innerHTML = `${q.label}<span class="qt">${q.note}</span>`;
  btn.onclick = () => { scrubMins = q.t; document.getElementById('scrubber').value=q.t; updateTimeDisplay(); simulate(); };
  qb.appendChild(btn);
});

document.getElementById('scrubber').addEventListener('input', e => {
  scrubMins = parseInt(e.target.value);
  updateTimeDisplay();
  simulate();
});

function updateTimeDisplay() {
  const h = Math.floor(scrubMins/60), m = scrubMins%60;
  const ampm = h >= 12 ? 'PM' : 'AM';
  const h12 = h%12 || 12;
  document.getElementById('timeDisplay').innerHTML = `${String(h12).padStart(2,'0')}:${String(m).padStart(2,'0')} <span class="ampm">${ampm}</span>`;
}

function snapToNow() {
  const now = getPeruTime();
  const todayKey = getTodayKey();
  selDay = DAYS.find(d=>d.key===todayKey) ? todayKey : 'pre';
  scrubMins = now.getHours()*60 + now.getMinutes();
  document.getElementById('scrubber').value = scrubMins;
  strip.querySelectorAll('.day-pill').forEach(b=>b.classList.remove('active'));
  const match = Array.from(strip.querySelectorAll('.day-pill'));
  const idx = DAYS.findIndex(d=>d.key===selDay);
  if(idx>=0 && match[idx]) match[idx].classList.add('active');
  updateTimeDisplay();
  simulate();
}

function launchConfetti() {
  const c = document.getElementById('confetti');
  c.innerHTML = '';
  const e=['🎂','🎉','🦙','🌄','✨','🎊','💫','🏔️','🌟','🫶'];
  for(let i=0;i<35;i++){
    const s=document.createElement('span');
    s.className='sparkle';
    s.textContent=e[Math.floor(Math.random()*e.length)];
    s.style.left=Math.random()*100+'vw';
    s.style.animationDuration=(2+Math.random()*3)+'s';
    s.style.animationDelay=(Math.random()*2)+'s';
    s.style.fontSize=(14+Math.random()*18)+'px';
    c.appendChild(s);
  }
  setTimeout(()=>c.innerHTML='',6000);
}


function factsHTML(item) {
  if (!item || !item.facts || !item.facts.length) return '';
  const place = item.place || 'This location';
  let html = `<div class="facts-card">
    <div class="facts-header">
      <span class="facts-icon">💡</span>
      <div>
        <div class="facts-title">Did you know?</div>
        <div class="facts-place">${place}</div>
      </div>
    </div>`;
  item.facts.forEach((f, i) => {
    html += `<div class="fact-item" id="fact-${i}" onclick="revealFact(${i})">
      <div class="fact-num">${i+1}</div>
      <div class="fact-text">${f}</div>
    </div>`;
  });
  html += `<div class="reveal-hint">Tap any fact to highlight it ✨</div></div>`;
  return html;
}

function revealFact(i) {
  const el = document.getElementById('fact-' + i);
  if (el) el.classList.toggle('revealed');
}

function simulate() {
  const nowMins = scrubMins;
  const h = Math.floor(nowMins/60), m = nowMins%60;
  const ampm = h>=12?'PM':'AM', h12=h%12||12;
  const timeStr = `${String(h12).padStart(2,'0')}:${String(m).padStart(2,'0')} ${ampm}`;

  const dateKey = (selDay === 'pre' || selDay === 'post') ? null : selDay;
  const tripStart = new Date(TRIP_CONFIG.tripStart);
  const tripEnd = new Date(TRIP_CONFIG.tripEnd);
  const isBirthday = dateKey === TRIP_CONFIG.birthdayDate;

  const pill = document.getElementById('simPill');
  const dayName = dateKey ? new Date(dateKey+'T12:00:00').toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'}) : (selDay==='pre'?'Before trip':'After trip');
  pill.className = 'sim-pill show';
  pill.innerHTML = `⏱ Simulating <strong>${dayName}</strong> at <strong>${timeStr}</strong> Lima time`;

  const result = document.getElementById('result');

  if (selDay === 'pre') {
    const diff = tripStart - new Date();
    const cd = fmtCountdown(Math.max(0,diff));
    result.innerHTML = `<div class="pre-box">
      <div style="font-size:42px">✈️</div>
      <div class="pre-title">Adventure starts soon!</div>
      <div class="pre-sub">Departing ${TRIP_CONFIG.departureCity} · April 30</div>
      <div class="cd-row">
        ${[{v:cd.d,u:'days'},{v:cd.h,u:'hrs'},{v:cd.m,u:'min'},{v:cd.s,u:'sec'}].map(x=>`
        <div class="cd-cell"><span class="cd-num">${x.v}</span><span class="cd-unit">${x.u}</span></div>`).join('')}
      </div>
    </div>`;
    return;
  }

  if (selDay === 'post') {
    result.innerHTML = `<div class="c-free" style="text-align:center">
      <span class="llama">🦙</span>
      <div style="font-family:'Fredoka One',cursive;font-size:24px;color:var(--gold);margin:12px 0 8px">Back home safely!</div>
      <div style="font-size:13px;color:var(--muted)">What an incredible trip — Machu Picchu on a birthday,<br>Peru, and Bogota. Welcome back, family!</div>
    </div>`;
    return;
  }

  if(isBirthday) launchConfetti();

  const { current, nextWithinHour } = resolveActivity(dateKey, nowMins);
  const dayLabel = DAY_LABELS[dateKey] || dateKey;

  let html = `<div style="text-align:center;font-size:12px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--muted)">${dayLabel}</div>`;
  if(isBirthday) html += `<div style="text-align:center;font-size:28px;letter-spacing:6px">🎂 🎉 🌄 🦙 ✨</div>`;

  if (current) {
    const isBday = current.type==='birthday';
    const tc = TYPE_CONFIG[current.type]||TYPE_CONFIG.logistics;
    const dur = toMins(current.end)-toMins(current.time);
    const elapsed = nowMins-toMins(current.time);
    const pct = Math.min(100,Math.max(0,Math.round((elapsed/dur)*100)));
    const rem = toMins(current.end)-nowMins;
    const remStr = rem>60?`${Math.floor(rem/60)}h ${rem%60}m left`:`${rem}m left`;
    html += `<div class="c-card ${isBday?'c-birthday':'c-current'}">
      <div class="card-label"><span class="${isBday?'bpulse':'pulse'}"></span>${isBday?'Happening now — Birthday moment! 🎂':'Happening now'}</div>
      <span class="tag ${tc.cls}">${tc.label}</span>
      <div class="act-time">${current.time} – ${current.end}</div>
      <div class="act-name">${current.name}</div>
      <div class="act-desc">${current.desc}</div>
      <div class="prog-wrap">
        <div class="prog-track"><div class="prog-fill" style="width:${pct}%"></div></div>
        <div class="prog-labels"><span>${pct}% complete</span><span>${remStr}</span></div>
      </div>
    </div>
    ${factsHTML(current)}`;
  }

  if (nextWithinHour) {
    const tc = TYPE_CONFIG[nextWithinHour.type]||TYPE_CONFIG.logistics;
    const startsIn = toMins(nextWithinHour.time)-nowMins;
    const startsStr = startsIn<=1?'starting now':startsIn<60?`in ${startsIn} min`:'in 1 hr';
    html += `<div class="c-card c-next">
      <div class="card-label">Up next · ${startsStr}</div>
      <span class="tag ${tc.cls}">${tc.label}</span>
      <div class="act-time">${nextWithinHour.time} – ${nextWithinHour.end}</div>
      <div class="act-name">${nextWithinHour.name}</div>
      <div class="act-desc">${nextWithinHour.desc}</div>
    </div>`;
  } else if (current) {
    html += `<div class="c-nothing"><div class="ni" style="font-size:28px;margin-bottom:8px">🌿</div><div style="font-family:'Fredoka One',cursive;font-size:17px;color:var(--muted);margin-bottom:4px">Nothing in the next hour</div><div style="font-size:12px;color:var(--dim)">Enjoy the moment — next activity coming later</div></div>`;
  }

  if (!current && !nextWithinHour) {
    html += `<div class="c-free"><div style="font-size:36px;margin-bottom:12px">🌙</div><div style="font-family:'Fredoka One',cursive;font-size:20px;color:var(--gold);margin-bottom:6px">Day complete!</div><div style="font-size:13px;color:var(--muted)">All activities for today are done. Rest well!</div></div>`;
  }

  result.innerHTML = html;
}

updateTimeDisplay();
simulate();
</script>
</body>
</html>
