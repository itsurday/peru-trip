<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Peru Trip 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#1A1A1A;color:#E8E0D0;font-family:"DM Sans",sans-serif;min-height:100vh;display:flex;flex-direction:column}
.header{background:linear-gradient(135deg,#1A1208 0%,#2A1F0A 50%,#1A1208 100%);border-bottom:1px solid #C8933A;padding:20px 20px 16px;text-align:center;position:relative}
.header h1{font-family:"Playfair Display",serif;font-size:22px;font-weight:500;color:#C8933A;letter-spacing:.02em}
.header-sub{font-size:12px;color:#9A8E7E;letter-spacing:.08em;text-transform:uppercase;margin-top:3px}
.live-time{position:absolute;top:16px;right:16px;font-size:11px;color:#9A8E7E;font-weight:300;text-align:right;line-height:1.5}
.tz-note{font-size:9px;color:#6A5E4E}
.main{flex:1;padding:24px 20px;max-width:480px;margin:0 auto;width:100%;display:flex;flex-direction:column;gap:16px}
.day-label{font-size:11px;font-weight:500;color:#9A8E7E;letter-spacing:.1em;text-transform:uppercase;text-align:center}
.current-card{background:linear-gradient(135deg,#1C2E1C,#162816);border:1px solid #40916C;border-radius:20px;padding:24px;position:relative;overflow:hidden}
.current-card::before{content:"";position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,#2D6A4F,#40916C,#2D6A4F)}
.next-card{background:#2A2A2A;border:1px solid #3A3A3A;border-radius:20px;padding:24px}
.birthday-card{background:linear-gradient(135deg,#2A0A18,#1E0812);border:1px solid #7A2040;border-radius:20px;padding:24px;position:relative;overflow:hidden}
.birthday-card::before{content:"";position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,#7A2040,#D4537E,#7A2040)}
.pre-card{background:#2A2A2A;border:1px solid #3A3020;border-radius:20px;padding:32px 24px;text-align:center}
.free-card{background:#2A2A2A;border:1px solid #3A3A3A;border-radius:20px;padding:40px 24px;text-align:center}
.nothing-card{background:#2A2A2A;border:1px dashed #3A3A3A;border-radius:20px;padding:28px 24px;text-align:center}
.card-label{font-size:10px;font-weight:500;letter-spacing:.12em;text-transform:uppercase;margin-bottom:14px;display:flex;align-items:center;gap:7px;color:#40916C}
.birthday-card .card-label{color:#D4537E}
.next-card .card-label{color:#9A8E7E}
.pulse{width:7px;height:7px;border-radius:50%;background:#40916C;animation:pulse 2s infinite;flex-shrink:0}
.bpulse{width:7px;height:7px;border-radius:50%;background:#D4537E;animation:pulse 2s infinite;flex-shrink:0}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(.8)}}
.tag{display:inline-block;font-size:10px;padding:3px 9px;border-radius:99px;margin-bottom:10px;font-weight:500;letter-spacing:.04em;text-transform:uppercase}
.tag-logistics{background:#1B3A5C;color:#7EC8E3}
.tag-morning{background:#3D2B00;color:#FFBC42}
.tag-afternoon{background:#0D3328;color:#56D98F}
.tag-evening{background:#2A1A40;color:#B09FE8}
.tag-birthday{background:#3D0A1E;color:#FF7AAD}
.tag-priority{background:#3D0000;color:#FF7070}
.activity-time{font-size:12px;color:#9A8E7E;margin-bottom:6px;font-weight:300}
.activity-name{font-family:"Playfair Display",serif;font-size:22px;font-weight:400;line-height:1.3;margin-bottom:10px}
.birthday-card .activity-name{color:#FFB8D4}
.activity-desc{font-size:13px;color:#9A8E7E;line-height:1.7;font-weight:300}
.prog-wrap{margin-top:16px}
.prog-track{height:3px;background:rgba(255,255,255,.08);border-radius:99px;overflow:hidden;margin-bottom:6px}
.prog-fill{height:100%;background:#40916C;border-radius:99px}
.prog-labels{display:flex;justify-content:space-between;font-size:11px;color:#9A8E7E}
.cd-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin:16px 0}
.cd-cell{background:#1F1A10;border:1px solid #3A3020;border-radius:10px;padding:10px 4px;text-align:center}
.cd-num{font-family:"Playfair Display",serif;font-size:24px;color:#C8933A;display:block}
.cd-unit{font-size:10px;color:#9A8E7E;letter-spacing:.06em;text-transform:uppercase}
.flight-card{margin-top:16px;background:#1F1A10;border:1px solid #3A3020;border-radius:12px;padding:14px 16px}
.flight-label{font-size:10px;font-weight:500;letter-spacing:.1em;text-transform:uppercase;color:#C8933A;margin-bottom:10px}
.flight-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.airport-code{font-family:"Playfair Display",serif;font-size:24px;color:#E8E0D0}
.airport-city{font-size:11px;color:#9A8E7E}
.flight-mid{text-align:center}
.flight-num{font-size:11px;color:#C8933A;margin-bottom:2px}
.flight-icon{font-size:20px;color:#9A8E7E}
.flight-dur{font-size:10px;color:#6A5E4E}
.flight-footer{border-top:1px solid #3A3020;padding-top:8px;display:flex;justify-content:space-between}
.flight-time-label{font-size:12px;color:#9A8E7E}
.flight-time-val{color:#E8E0D0;font-weight:500}
.facts-card{background:#1F1A10;border:1px solid #3A3020;border-radius:16px;padding:18px 20px}
.facts-header{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.facts-icon{font-size:18px}
.facts-title{font-size:11px;font-weight:500;letter-spacing:.1em;text-transform:uppercase;color:#C8933A}
.facts-place{font-size:12px;color:#9A8E7E;margin-top:1px}
.reveal-hint{font-size:11px;color:#6A5E4E;text-align:center;margin-bottom:10px;font-style:italic}
.fact-item{display:flex;gap:10px;margin-bottom:10px;align-items:flex-start;cursor:pointer}
.fact-item:last-child{margin-bottom:0}
.fact-num{width:22px;height:22px;border-radius:50%;background:#3A3020;border:1px solid #C8933A;font-size:10px;font-weight:500;color:#C8933A;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px;transition:all .2s}
.fact-text{font-size:13px;color:#9A8E7E;line-height:1.6;flex:1;transition:all .2s}
.fact-item.revealed .fact-num{background:#C8933A;color:#1A1208}
.fact-item.revealed .fact-text{color:#E8E0D0}
.dinner-card{background:linear-gradient(135deg,#1F1208,#2A1A08);border:1px solid #C8933A;border-radius:20px;padding:20px 22px;position:relative;overflow:hidden}
.dinner-card::before{content:"";position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,#C8933A,#F5C86A,#C8933A)}
.dinner-label{font-size:10px;font-weight:500;letter-spacing:.12em;text-transform:uppercase;color:#C8933A;margin-bottom:12px;display:flex;align-items:center;gap:7px}
.dinner-name{font-family:"Playfair Display",serif;font-size:20px;color:#E8E0D0;margin-bottom:4px}
.dinner-name a{color:#E8E0D0;text-decoration:none;border-bottom:1px solid #C8933A}
.dinner-tagline{font-size:12px;color:#C8933A;font-weight:500;margin-bottom:8px}
.dinner-desc{font-size:13px;color:#9A8E7E;line-height:1.6;margin-bottom:10px}
.dinner-pills{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px}
.dinner-pill{font-size:11px;background:#1A1208;border:1px solid #3A3020;border-radius:99px;padding:3px 10px;color:#9A8E7E}
.dinner-must{font-size:12px;color:#6A5A40;padding-top:8px;border-top:1px solid #3A3020;margin-bottom:10px}
.dinner-must strong{color:#C8933A}
.dinner-options-link{display:block;text-align:center;font-size:12px;color:#C8933A;text-decoration:none;padding:8px;border:1px solid #3A3020;border-radius:10px;margin-top:4px;letter-spacing:.04em}
.tt-bar{background:#1F1A10;border-bottom:1px solid #3A3020;padding:10px 16px;display:flex;align-items:center;gap:8px;flex-wrap:wrap;justify-content:center}
.tt-label{font-size:11px;color:#9A8E7E;font-weight:500;letter-spacing:.06em;text-transform:uppercase;white-space:nowrap}
.tt-select{background:#2A2A2A;border:1px solid #3A3020;border-radius:10px;color:#E8E0D0;font-family:"DM Sans",sans-serif;font-size:13px;padding:6px 10px;outline:none;-webkit-appearance:none;cursor:pointer}
.tt-select option{background:#1A1A1A}
.tt-time{background:#2A2A2A;border:1px solid #3A3020;border-radius:10px;color:#E8E0D0;font-family:"DM Sans",sans-serif;font-size:13px;padding:6px 10px;outline:none;width:88px;cursor:pointer}
.tt-btn{background:linear-gradient(135deg,#C8933A,#F5C86A);border:none;border-radius:10px;color:#1A1208;font-family:"DM Sans",sans-serif;font-size:12px;font-weight:600;padding:7px 16px;cursor:pointer;white-space:nowrap}
.tt-live{background:transparent;border:1px solid #3A3020;border-radius:10px;color:#9A8E7E;font-family:"DM Sans",sans-serif;font-size:12px;padding:7px 14px;cursor:pointer;white-space:nowrap}
.tt-banner{background:#3A2010;border-bottom:1px solid #C8933A;padding:8px 16px;text-align:center;font-size:12px;color:#C8933A;display:none}
</style>
</head>
<body>
<div class="header">
  <div class="live-time">
    <span id="clockDisplay">--:-- --</span>
    <div class="tz-note" id="clockDate">Lima time</div>
  </div>
  <h1>Peru Trip 2026</h1>
  <div class="header-sub">May 1&ndash;6, 2026</div>
</div>
<div class="tt-bar">
  <span class="tt-label">&#9200; Relive the trip</span>
  <select class="tt-select" id="ttDate">
    <option value="">-- Pick a day --</option>
    <option value="2026-04-30">Apr 30 &mdash; Departure from Chicago &#9992;&#65039;</option>
    <option value="2026-05-01">May 1 &mdash; Arrival in Peru</option>
    <option value="2026-05-02">May 2 &mdash; Ticket Day</option>
    <option value="2026-05-03">May 3 &mdash; Birthday at Machu Picchu &#127874;</option>
    <option value="2026-05-04">May 4 &mdash; Sacred Valley</option>
    <option value="2026-05-05">May 5 &mdash; Departing Peru</option>
    <option value="2026-05-06">May 6 &mdash; Bogota &amp; Home</option>
  </select>
  <input type="time" class="tt-time" id="ttTime" value="09:00">
  <button class="tt-btn" onclick="applyTT()">&#10132; Go</button>
  <button class="tt-live" onclick="resetTT()">&#128994; Live</button>
</div>
<div class="tt-banner" id="ttBanner"></div>
<div class="main" id="main"></div>

<script>
var SCHEDULE = {
  "2026-04-30": [
    { time:"12:00", end:"21:00", name:"Last day at home — pack and prepare", desc:"Final packing, print documents, download offline maps. Passports, tickets, soles envelope, phone chargers. Dinner at home — early night!", type:"morning", place:"Chicago, Illinois", facts:["Pack light — you are going somewhere incredible and you will want room for souvenirs!","Comfortable walking shoes are the most important thing in your suitcase. You will thank yourself later.","Sunscreen SPF50+ is essential — the destination has very strong UV rays at altitude.","A light waterproof jacket is a must — the weather can change quickly where you are going.","Bring a small daypack that fits inside your main luggage — you will need it.","Layers are key — your destination can be hot during the day and cold at night.","Download offline maps of South America before you leave — just in case!","Charge all your devices fully tonight — you will want every photo and video on this trip.","Tonight is the last night in Chicago — tomorrow the adventure of a lifetime begins.","Someone who loves you very much has planned something extraordinary. Trust the journey!"] },
    { time:"21:00", end:"22:30", name:"Head to O'Hare Airport (ORD)", desc:"Leave for O'Hare by 9pm for 11:20pm departure. Check in, security, grab a last American meal at the terminal. Gate area by 10:30pm.", type:"logistics", place:"Chicago O'Hare Airport", facts:["O'Hare International Airport is one of the busiest airports in the world — 83 million passengers per year!","Terminal 5 handles all international departures — the adventure starts the moment you walk through those doors.","Look around the terminal — people are heading to every corner of the world tonight.","Red-eye flights are actually great for long journeys — you sleep and wake up somewhere completely new.","The airline you are flying tonight has been connecting the Americas since 1919.","Your destination is in a completely different time zone — the world is about to feel bigger.","Somewhere in the world right now, someone is having the most extraordinary experience of their life. Tonight that is you.","The best trips are the ones where you do not fully know what is coming next.","Passport — check. Sense of adventure — check. Everything else can be figured out along the way.","Whatever is waiting at the other end of this flight — it is going to be unforgettable."] },
    { time:"23:20", end:"23:59", name:"AV263 departs — Chicago to Bogota", desc:"Departs 11:20pm from O'Hare Terminal 5. Red-eye overnight flight. Arrives Bogota El Dorado ~5:30am. Sleep on the plane!", type:"logistics", place:"In the Air", facts:["Right now you are flying over the Gulf of Mexico — look down, that is the Caribbean Sea below!","Somewhere in the world there is an ancient wonder that fewer than 1% of humans will ever see in person.","The destination waiting for you has been a mystery to the outside world for centuries.","Civilizations rose and fell long before the Wright Brothers ever flew — tonight you are crossing their sky.","When you land you will be closer to the equator than you have ever been — the stars look different here.","The connecting city you land in first is one of the highest capital cities on Earth.","Sleep well on this flight — your body will thank you when the real adventure begins tomorrow.","Whatever you are imagining is waiting for you — the reality is even more extraordinary.","Someone planned every detail of what comes next with so much love. You are in very good hands.","Close your eyes. When you open them the adventure will have truly begun."] }
  ],
  "2026-05-01": [
    { time:"11:20", end:"12:30", name:"Land at Cusco Airport", desc:"TreXperience driver waiting at arrivals. Clear immigration + collect bags (~75 min). Exchange $320 USD to soles at airport — separate 400 soles into Ministry of Culture envelope.", type:"logistics", place:"Cusco Airport (CUZ)", facts:["Cusco Airport sits at 3,399m — one of the highest commercial airports in the world!","The word Cusco in Quechua means Navel of the World — the Incas believed it was the center of the universe.","Your body needs 24-48 hrs to adjust to the altitude here. Drink lots of water and go slow!","Coca tea is served everywhere in Cusco — it helps with altitude sickness and tastes like green tea.","The Inca Empire was the largest empire in pre-Columbian America, stretching 4,300 km along the Andes.","Cusco was the capital of the Inca Empire from the 13th century until Spanish conquest in 1533.","The city was deliberately built in the shape of a puma — a sacred animal in Inca culture.","Quechua, the language of the Incas, is still spoken by over 8 million people today.","Cusco receives about 2 million tourists every year — more than any other city in Peru.","Buy a Claro SIM card at the airport kiosk — best coverage in the Sacred Valley and Aguas Calientes."] },
    { time:"12:30", end:"15:07", name:"Drive to Ollantaytambo", desc:"Private van ~1.5 hrs with TreXperience. Drop checked bag at PeruRail free storage. Quick lunch in town.", type:"logistics", place:"Sacred Valley", facts:["The Sacred Valley stretches 60km between Cusco and Machu Picchu along the Urubamba River.","The Incas grew over 3,000 varieties of potato in the Sacred Valley — yes, 3,000!","The valley sits 600m lower than Cusco, so the air feels noticeably easier to breathe here.","Incan farmers built terraces called andenes to farm steep hillsides — some are still used today.","The Urubamba River was called Willkamayu meaning Sacred River in Quechua.","The Sacred Valley was chosen by the Incas for its perfect farming climate and spiritual energy.","You might spot condors soaring above the valley — they have a wingspan of up to 3.2 meters!","Local women still wear traditional colorful clothing called polleras every day.","The valley produces the best corn in Peru — the kernels are giant compared to regular corn.","Archaeologists are still discovering new Inca ruins hidden in the mountains of the Sacred Valley."] },
    { time:"15:07", end:"15:37", name:"Board train at Ollantaytambo", desc:"PeruRail Vistadome Observatory 603. Be on the platform 30 min before departure. Departs 15:37.", type:"logistics", place:"Ollantaytambo", facts:["Ollantaytambo is the only Inca town in Peru still inhabited in original Inca buildings!","The fortress was one of the few places where the Incas successfully defeated the Spanish conquistadors.","The town was built in the shape of a maize cob — corn was sacred to the Incas.","Water channels built by the Incas 600 years ago still run through the streets today.","The massive stone blocks were quarried from a mountain 6km away and across the river!","Ollantaytambo means Resting place of Ollanta — named after a legendary Inca general.","The town has had running water since Inca times — one of the oldest water systems in the Americas.","Local kids play football in the same plaza where Inca ceremonies were held 500 years ago.","The ruins were a filming location for the movie The Motorcycle Diaries.","You can still see original Inca walls lining the narrow streets — the Spanish built on top of them."] },
    { time:"15:37", end:"17:02", name:"Train to Aguas Calientes", desc:"Panoramic cloud forest journey through the Andes descending into the jungle. Arrives Machu Picchu Pueblo station 17:02.", type:"afternoon", place:"Cloud Forest Railway", facts:["The train descends over 1,500m in just 1.5 hours — one of the most dramatic rail journeys on Earth!","The cloud forest is home to over 300 species of orchid.","This valley is so narrow that the train tracks were built right next to the rushing Urubamba River.","The cloud forest produces its own rain — clouds get trapped by the mountains constantly.","You might spot a torrent duck on the river rocks — one of the few birds that swim in rapids.","The Vistadome glass roof lets you see the mountain peaks towering straight above the train.","Watch the vegetation change as you descend from Andes to the edge of the Amazon!","Spectacled bears — the inspiration for Paddington Bear — live in these cloud forests.","The cloud forest here is one of the most biodiverse ecosystems on the planet.","Machu Picchu was only connected to Cusco by rail in 1948 — before that, only reachable on foot."] },
    { time:"17:02", end:"18:30", name:"Arrive and check in — Casa Andina", desc:"Drop bags, freshen up. Ask hotel staff about Ministry of Culture token queue timing tomorrow. Request early breakfast for May 3 (before 6:30am). Ask them to store bags after May 3 checkout.", type:"logistics", place:"Aguas Calientes", facts:["Aguas Calientes means Hot Waters in Spanish — named after the natural hot springs here.","The town only has about 3,000 permanent residents but receives over 1 million tourists per year!","There are no roads to Aguas Calientes — the only way in is by train or a 2-day hike.","The town sits inside a deep gorge with mountains rising 2,000m on both sides.","The Urubamba River rushing through town is one of the fastest rivers in Peru.","Aguas Calientes was almost completely destroyed by a mudslide in 2010 and rebuilt from scratch.","The town square has a statue of Pachacutec — the Inca emperor who built Machu Picchu.","Every shop, hotel, and restaurant in town exists entirely because of Machu Picchu.","The natural hot springs here reach 40C — perfect for sore legs after hiking!","At night the mountains surrounding the town are completely dark — incredible stars overhead."] },
    { time:"18:30", end:"19:30", name:"Ministry of Culture — Chance #1", desc:"Check if office still open on Av. Pachacutec. If open, buy Circuit 2A tickets for May 3 (8am entry) for 2 adults + 1 child. Pay exact soles cash only.", type:"priority", place:"Aguas Calientes", facts:["You already have 2A tickets for 8am on May 3 — if this is shown it means you are checking status again.","Circuit 2A is the classic route — Guardian House viewpoint, Temple of the Sun, full ruins tour.","Your tickets are personal — names must match passports exactly at all 3 checkpoints.","Keep your tickets in your phone (screenshot) AND printed if possible as backup.","The 8am entry means wake-up at 6am — a much more comfortable start than 4:30am!","Morning mist at Machu Picchu typically lasts until 9-10am — 8am entry still catches it.","The golden light at 8am on the ruins is warm and beautiful for birthday photos.","Circuit 2A includes the famous Guardian House viewpoint — the iconic postcard shot.","You will have roughly 2.5 hours to explore before the site gets crowded.","The birthday moment at Machu Picchu at 8am will be extraordinary — the mist, the light, the llamas."] },
    { time:"19:30", end:"21:00", name:"Dinner — TUNAWA Andean Fusion", desc:"Rated 4.8. River views. Famous for Laguna ceviche with passion fruit and grilled trucha. Chicken saltado also excellent. 5-min walk from plaza. Early night!", type:"evening", place:"Aguas Calientes", facts:["Aguas Calientes means Hot Waters in Spanish — named after the natural hot springs here.","The town only has about 3,000 permanent residents but receives over 1 million tourists per year!","There are no roads to Aguas Calientes — the only way in is by train or a 2-day hike.","The Urubamba River rushing through town is one of the fastest rivers in Peru.","Every shop, hotel, and restaurant in town exists entirely because of Machu Picchu.","The natural hot springs here reach 40C — perfect for sore legs after hiking!","At night the mountains surrounding the town are completely dark — incredible stars overhead.","The town square has a statue of Pachacutec — the Inca emperor who built Machu Picchu.","You are less than 8km from one of the Seven Wonders of the World right now!","Peruvian cuisine has been voted World Best Culinary Destination 8 consecutive years!"] },
    { time:"21:00", end:"23:59", name:"Sleep — alarm set for 6:00am", desc:"Lower altitude means great sleep for everyone. You have 2A tickets for 8am — wake-up at 6am tomorrow for breakfast and bus queue.", type:"logistics", place:"Aguas Calientes", facts:["Sleeping at 2,040m altitude is much easier than Cusco at 3,400m — you chose wisely!","Your body repairs itself during sleep — especially important before a big mountain hike tomorrow.","The sound of the Urubamba River creates a natural white noise — great for sleeping.","Machu Picchu at 8am still has morning mist rolling through the ruins — absolutely magical.","The bus queue starts at 5am but for 8am entry you only need to be there by 7:15am.","Tomorrow is the big day — Machu Picchu on a birthday! Rest well.","The temperature drops significantly at night in the gorge — use all the hotel blankets!","Machu Picchu faces east so the sunrise hits the ruins directly — stunning golden light.","The Incas deliberately oriented Machu Picchu to align with the rising sun during the solstice.","You are less than 8km from one of the Seven Wonders of the World right now!"] }
  ],
  "2026-05-02": [
    { time:"05:00", end:"05:30", name:"Guide meets at hotel", desc:"TreXperience guide accompanies family to the Ministry of Culture queue for token collection.", type:"priority", place:"Aguas Calientes", facts:["Licensed Machu Picchu guides must pass a rigorous government exam — they know every stone!","Your TreXperience guide speaks English and Quechua — the original language of the Incas.","A good guide transforms Machu Picchu from old rocks to a living breathing Inca city story.","Guides are legally required inside Machu Picchu — solo exploration is not permitted.","Many guides are descendants of the Quechua people who built Machu Picchu.","TreXperience guides are trained to do Inca treasure hunts for kids — your 8-year-old will love it!","Your guide knows exactly which viewpoints get the best photos at which times of day.","A bilingual guide costs about the same as a nice dinner — and is worth 10x more.","Your guide today will also help you navigate the Ministry of Culture — that alone is priceless.","The best guides bring snacks, know all the shortcuts, and make sure no one gets left behind."] },
    { time:"05:30", end:"07:00", name:"Queue — Ministry of Culture tokens", desc:"All 3 family members with passports. Collect numbered tokens from 6am. Ticket purchase opens at 3pm — you will return then. For now tokens secured and morning is free!", type:"priority", place:"Aguas Calientes", facts:["The Ministry of Culture distributes numbered tokens from 6am — get yours early!","Ticket sales open at 3pm same day — your token number holds your place in the queue.","All 3 family members should be present with passports — each ticket is personal and non-transferable.","Pay in exact Peruvian Soles cash only — approximately 152 soles per adult, 77 soles child. No change given!","The 3pm ticket window can sell out of popular circuits — 2A sells fastest.","Morning light in Aguas Calientes is beautiful — the mist in the gorge looks like a movie.","The queue at 5:30am is quiet and peaceful — most tourists are still asleep in their hotels.","Your guide presence in the queue means you will know exactly what to ask for at the window.","After getting your tokens, the whole morning is free — waterfalls and thermal baths await!","Location: Av. Pachacutec, near the main plaza — search Ministerio de Cultura Machu Picchu on Google Maps."] },
    { time:"07:00", end:"08:30", name:"Hotel breakfast", desc:"Tokens secured! Eat well. Build excitement with the kid for tomorrow at Machu Picchu. Brief the 8-year-old on what to expect — gets them excited!", type:"morning", place:"Aguas Calientes", facts:["A proper breakfast before a hike is crucial — protein and carbs give you energy for hours.","Peruvian breakfast often includes pan (fresh bread), fresh fruit juice, and eggs.","Quinoa porridge is a local breakfast staple — quinoa has been grown in the Andes for 5,000 years!","Fresh passion fruit juice (maracuya) is found everywhere in Peru — try it if you have not!","Peruvians drink mate de coca (coca leaf tea) every morning — it helps with energy and altitude.","The coca plant used in tea is completely legal in Peru and has been used medicinally for 4,000 years.","Tonight you need to be in bed by 9pm at the latest — 6am wake-up for Machu Picchu tomorrow.","Eating a big breakfast now means you can pack lighter snacks for the Machu Picchu hike tomorrow.","Your 8-year-old should eat plenty of carbs today — they need extra energy for tomorrow.","The hotel breakfast view of the misty gorge in the morning is absolutely stunning!"] },
    { time:"08:30", end:"10:00", name:"Thermal baths — morning soak", desc:"Natural hot springs, ~15 soles. Best time to go — quiet, fresh morning air. Bring towel and flip-flops. Warm muscles before tomorrow big hike. Kids love splashing!", type:"morning", place:"Aguas Calientes Hot Springs", facts:["The hot springs reach 40C — naturally heated by volcanic activity deep underground!","Hot springs have been used by Andean people for healing and relaxation for over 2,000 years.","The mineral-rich water is said to help with muscle soreness — perfect before a mountain hike.","There are multiple pools at different temperatures — try starting warm and moving hotter.","The springs are at the base of a forested cliff — the setting is dramatic and beautiful.","Bring flip-flops — the pool floors can be slippery and shared footwear is not allowed.","Morning is the absolute best time — fewer crowds, fresh mountain air, and clear skies.","Local Quechua people believe the hot springs have medicinal properties for joints and skin.","The water flowing into the pools comes directly from natural underground springs in the mountain.","Soaking in hot springs at altitude is very relaxing — your legs will thank you tomorrow!"] },
    { time:"10:00", end:"12:30", name:"Waterfalls — Mandor or Alcamayo", desc:"Option A: Mandor sanctuary (45-min walk along tracks, 20 soles). Option B: Alcamayo pools (20-min walk, 20 soles). Both totally off the tourist radar.", type:"morning", place:"Aguas Calientes Waterfalls", facts:["The Mandor Waterfall sanctuary is one of the best-kept secrets near Machu Picchu!","The walk to Mandor follows the active train tracks — trains are very slow and loud here, completely safe.","Mandor sanctuary has over 50 species of orchid — some only bloom once a year.","On a clear day you can see the peak of Machu Picchu mountain from the Mandor viewpoint!","Alcamayo waterfall feeds two natural swimming pools — the water is cold but refreshing.","The cloud forest around both waterfalls has butterflies the size of your hand!","Spectacled bears have been spotted near Mandor sanctuary — they are very shy and harmless.","The sound of both waterfalls is so loud you have to shout to talk to each other nearby!","Both waterfalls are completely free from crowds — a rare thing this close to Machu Picchu.","The walk along the train tracks passes local farms where you can buy fresh fruit directly."] },
    { time:"12:30", end:"14:00", name:"Lunch — Ayahuasca Grill", desc:"Rated 4.9. Walk uphill away from tourist strip. Best trout and chicken in Aguas Calientes. Ask for a table with river view.", type:"afternoon", place:"Aguas Calientes", facts:["Trucha (Andean trout) is the signature dish of Aguas Calientes — fresh from mountain rivers.","The Andean trout is not native to Peru — it was introduced from North America but thrived here.","Peruvian cuisine was voted the World Best Culinary Destination for 8 consecutive years!","Pollo saltado (stir-fried chicken) is Peru most beloved home-cooking dish.","Aji amarillo — yellow chilli — is the backbone of Peruvian cooking. Not too spicy, very aromatic.","Peru has 3,000+ varieties of potato and 55 varieties of corn — all originally from the Andes.","Restaurants uphill from the train station are always better and cheaper than tourist-strip spots.","Chicha Morada (purple corn drink) is uniquely Peruvian — sweet, refreshing, full of antioxidants.","The best meal you eat in Peru will probably be a hidden local spot like this one!","Ceviche, Peru national dish, was actually invented on the Pacific coast — not up here in the mountains."] },
    { time:"14:00", end:"14:45", name:"Town stroll + artisan market", desc:"Manco Capac Square. Buy kid a Machu Picchu souvenir to build excitement for tomorrow. Last chance to pick up snacks for the morning hike.", type:"afternoon", place:"Aguas Calientes", facts:["Manco Capac was the legendary first Inca emperor — said to have emerged from Lake Titicaca.","The artisan market sells hand-woven alpaca products — alpaca wool is softer than cashmere!","Alpaca sweaters and scarves sold here are made using techniques passed down for over 500 years.","Real alpaca wool is odor-resistant, hypoallergenic, and warmer than sheep wool.","Bargaining is completely normal in Peruvian markets — start at 50% of asking price.","The best souvenir from Peru is a hand-woven textile — each pattern tells a story.","Children in Peru often help their families weave textiles — a skill learned from age 5 or 6.","The colors in Andean textiles come from natural dyes made from plants, insects, and minerals.","A small Machu Picchu keychain makes a perfect souvenir for a young explorer.","The plaza at dusk fills with local families, street food, and the sound of the river below."] },
    { time:"14:45", end:"16:30", name:"Return — Ministry of Culture 3pm ticket purchase", desc:"BE THERE BY 2:45PM SHARP. Tickets on sale at 3pm. Ask for Circuit 2A, 8am entry, May 3. Pay EXACT soles cash — 400 soles ready. No change given. Take photos of tickets immediately!", type:"priority", place:"Aguas Calientes", facts:["The Ministry of Culture ticket window opens at exactly 3pm — numbers called in batches.","Being late even 10 minutes can mean missing your batch and waiting much longer.","Ask specifically for Circuit 2A, 8am entry, May 3 — be clear and direct at the window.","Each ticket is printed with your name and passport number — they match your ID at 3 checkpoints.","The daily capacity of 4,044 visitors is divided across all circuits — 2A sells fastest.","Once you have the tickets in hand, take a photo of them immediately as backup.","Check every detail on the ticket: name spelling, date, circuit number, entry time.","The ticket is valid only for the exact date and entry time slot printed on it.","Having your guide present at the window makes this whole process smooth and stress-free.","Bring a pen — sometimes you need to fill in a form before purchasing."] },
    { time:"16:30", end:"19:00", name:"Relax + dinner prep", desc:"Rest at the hotel. Pack your Machu Picchu daypack for tomorrow: 1L water each, snacks, sunscreen SPF50+, light rain jacket, passports, and printed + digital tickets.", type:"afternoon", place:"Aguas Calientes", facts:["Packing your Machu Picchu daypack tonight means no rushing in the dark at 6am tomorrow.","Each person daypack for tomorrow: 1L water, snacks, sunscreen, light jacket, passport, ticket.","The 8am entry means a 7:15am bus queue — much more civilized than the 5am scramble!","Sunscreen is essential at Machu Picchu — altitude means much stronger UV rays than at sea level.","A light rain jacket is important — May can have brief morning showers at Machu Picchu.","Comfortable walking shoes are mandatory — no sandals, no new shoes that might blister.","The citadel allows no re-entry once you exit — plan bathroom breaks before entering.","The bus ride up to Machu Picchu takes 20 minutes on a winding road with 13 hairpin turns.","Tomorrow is the birthday at a Wonder of the World. Nothing beats this for a celebration.","Set two alarms for 6am — the bus queue for 8am entry should start at 7:15am."] },
    { time:"19:00", end:"20:30", name:"Dinner — Mistura restaurant", desc:"Rated 4.7. River views. Famous for grilled trucha and pollo saltado. Mention tomorrow is the birthday — staff known for surprises! Early night after.", type:"evening", place:"Aguas Calientes", facts:["Tonight is the last calm evening before the biggest adventure of the trip.","Packing your Machu Picchu daypack tonight means no rushing in the dark tomorrow.","The 8am entry means wake-up at 6am — you get a proper night sleep tonight.","Peruvian restaurants always appreciate when you mention special occasions — expect a surprise!","The mist at Machu Picchu in the morning is caused by warm humid air rising from the Amazon below.","Tomorrow birthday moment at Machu Picchu will be one of the most memorable of your lives.","The last bus back from Machu Picchu leaves at 5:30pm — you will be back well before that.","Circuit 2A includes the Guardian House viewpoint — the most iconic photo spot in Peru.","Golden hour at Machu Picchu runs from 8am to about 10am — perfect for your entry time.","Tomorrow is the birthday — Machu Picchu Circuit 2A at 8am. There is no better way to celebrate."] },
    { time:"20:30", end:"23:59", name:"Sleep — alarm set for 6:00am", desc:"Everyone sleeps. 8am entry means a 7:15am bus queue. The golden hour mist will still be rolling through the terraces. This is the moment you came for.", type:"logistics", place:"Aguas Calientes", facts:["Machu Picchu at 8am still has beautiful morning mist — it typically lasts until 9-10am in May.","The site opens at 6am — 8am entry means you arrive as the first wave of visitors are mid-circuit.","The iconic Guardian House viewpoint on Circuit 2A is about 10 minutes from the entrance.","In May the site is lush and green from the rainy season — the most photogenic time of year.","Llamas and alpacas roam freely inside Machu Picchu — they keep the grass trimmed!","The Incas built Machu Picchu in just 60-70 years — an extraordinary feat with only hand tools.","No wheels, no iron tools, no mortar — every stone was placed by hand and fits perfectly.","Machu Picchu was abandoned around 1572 and forgotten by the outside world for 350 years.","Hiram Bingham III rediscovered the site in 1911 — but local people always knew it was there.","Tomorrow at 8am you will stand where Inca royalty stood 500 years ago. Sleep well!"] }
  ],
  "2026-05-03": [
    { time:"06:00", end:"06:45", name:"Wake up + hotel breakfast", desc:"Full breakfast — protein and carbs. Hotel has been asked to serve early breakfast. Pack daypacks: 1L water each, snacks, sunscreen SPF50+, light rain jacket, passports, Machu Picchu tickets (printed + digital).", type:"logistics", place:"Aguas Calientes", facts:["Today is the birthday AND Machu Picchu day — the most special morning of the trip!","Eating a full breakfast now is crucial — the high altitude burns energy much faster than at sea level.","Machu Picchu sits at 2,430m — lower than Cusco but still high enough to feel altitude effects.","The bus ride up takes 20 minutes on a winding road with 13 hairpin turns — sit by the window!","May is shoulder season — the site is green, not too crowded, and weather is mostly clear.","Sunscreen is essential at Machu Picchu — altitude means much stronger UV rays than at sea level.","The light at 8am on the ruins creates a beautiful warm glow — golden birthday light!","Your 8-year-old is about to experience something they will tell their own children about one day.","Happy birthday! What a day to celebrate — Machu Picchu Circuit 2A on a birthday.","The UNESCO World Heritage Site was designated in 1983 — it is protected as a global treasure."] },
    { time:"07:00", end:"07:30", name:"Guide meets at lobby + walk to bus stop", desc:"TreXperience guide meets at Casa Andina lobby at 7am. 5-min walk to the Consettur bus queue. Buy round-trip bus tickets at the window (~$24/adult, less for child). 20-min drive up.", type:"logistics", place:"Aguas Calientes", facts:["The Consettur bus company has been running the route to Machu Picchu since 1948!","The road up has 13 hairpin switchbacks — locals call it the zig-zag road.","Looking down from the bus window you can see the Urubamba River far below — a 400m drop!","The bus passes through cloud forest on the way up — sometimes in total mist, sometimes crystal clear.","On the drive up you might spot the Inca staircase carved into the mountainside.","The bus takes about 20 minutes — walking up on foot takes about 1 hour and 1,700 steps.","Round-trip bus tickets save you from the steep hike back down on tired legs.","Your licensed TreXperience guide meets you at the bus stop or hotel entrance — confirm tonight.","The bus queue at 7:15am is manageable — nowhere near as frantic as the 5am queue.","First light hits the peaks above Machu Picchu around 5:30am but the golden hour lasts until 10am."] },
    { time:"07:45", end:"08:00", name:"Arrive at Machu Picchu gate", desc:"Bus arrives at the top. Show passports and tickets at the main entrance checkpoint. Meet your TreXperience certified guide. Be ready to enter at exactly 8am.", type:"logistics", place:"Machu Picchu", facts:["Machu Picchu means Old Mountain in Quechua — the peak towering behind it is Young Mountain.","The site has 200 buildings, 3,000 stone steps, and over 100 stairways — all built without mortar!","The stones fit so perfectly that you cannot slide a piece of paper between them.","Machu Picchu was built around 1450 AD for Inca Emperor Pachacutec — it was his royal estate.","The Incas did not have wheels, iron tools, or a written language — yet they built this!","There are 3 passport checkpoints — entrance gate, inside the citadel, and the exit.","No re-entry is permitted once you exit — plan bathroom breaks at the entrance facilities.","Facilities (bathrooms, water) are only available at the entrance area outside the citadel.","The on-site restaurant just outside the entrance serves snacks and drinks — buy before entering.","You are about to walk into one of the most extraordinary places on Earth. Breathe."] },
    { time:"08:00", end:"10:30", name:"Machu Picchu Circuit 2A — Birthday!", desc:"Enter at 8am with morning mist still rolling through the terraces. TreXperience guide leads Circuit 2A with Inca treasure hunt for the 8-year-old. Guardian House viewpoint for the iconic birthday photo. Temple of the Sun, Sacred Plaza, Intihuatana stone. Allow 2.5 hrs.", type:"birthday", place:"Machu Picchu", facts:["Machu Picchu means Old Mountain in Quechua — the peak towering behind it is Young Mountain.","The site has 200 buildings, 3,000 stone steps, and over 100 stairways — all built without mortar!","The stones fit so perfectly that you cannot slide a piece of paper between them.","Machu Picchu was built around 1450 AD for Inca Emperor Pachacutec — it was his royal estate.","Circuit 2A includes the Guardian House viewpoint — the most iconic photo spot in all of Peru.","The llamas you see roaming the site are working animals that keep the grass trimmed.","Only about 40-50 people actually lived at Machu Picchu permanently — mostly priests and staff.","The site was abandoned suddenly in the 1500s — no one knows exactly why it was left.","Machu Picchu was voted one of the New Seven Wonders of the World in 2007 by 100 million voters!","The TreXperience guide will do an Inca treasure hunt for the 8-year-old — pure magic."] },
    { time:"10:30", end:"12:00", name:"Free time inside the citadel", desc:"After the guided circuit, take 30-45 mins to sit, soak it in, let the kid explore near the llamas. No rush. No re-entry once you exit. This is the moment.", type:"afternoon", place:"Machu Picchu", facts:["The classic postcard photo spot is at the Guardian House — your guide will take you there.","Look for the Temple of the Sun — its windows align perfectly with the winter solstice sunrise.","The Intihuatana stone was used by Inca priests to tie the sun during the solstice ceremonies.","Machu Picchu has its own microclimate — it can be sunny at the entrance and rainy at the far end!","The terraces were sophisticated drainage systems to prevent landslides — not just decorative.","More than 30% of the effort building Machu Picchu went underground — drainage and foundations.","The Temple of the Condor has a rock shaped exactly like a condor in flight — mind-blowing!","The view from the Guardian House is the exact image on every Machu Picchu postcard.","Sitting quietly for 5 minutes inside Machu Picchu and just breathing it in — unforgettable.","The mist at 8am that gradually burns off by 10am creates a magical shifting light show."] },
    { time:"12:00", end:"13:30", name:"Lunch + relax in Aguas Calientes", desc:"Return to Casa Andina, shower and change. Light birthday lunch in town — try the chocolate shop near the plaza for dessert. Collect bags from reception before the train.", type:"birthday", place:"Aguas Calientes", facts:["Aguas Calientes means Hot Waters in Spanish — named after the natural hot springs here.","The town only has about 3,000 permanent residents but receives over 1 million tourists per year!","There are no roads to Aguas Calientes — the only way in is by train or a 2-day hike.","The Urubamba River rushing through town is one of the fastest rivers in Peru.","Aguas Calientes was almost completely destroyed by a mudslide in 2010 and rebuilt from scratch.","Every shop, hotel, and restaurant in town exists entirely because of Machu Picchu.","The town square has a statue of Pachacutec — the Inca emperor who built Machu Picchu.","A cold glass of chicha morada after Machu Picchu is perfection.","Aguas Calientes has a little chocolate shop near the plaza — outstanding Peruvian dark chocolate.","Take a moment to celebrate — you just did Machu Picchu Circuit 2A on a birthday. Extraordinary."] },
    { time:"13:30", end:"15:20", name:"Collect bags + head to station", desc:"Pick up stored bags from Casa Andina reception. Walk to Machu Picchu Pueblo station. Board PeruRail Expedition 34 departing 15:20.", type:"logistics", place:"Aguas Calientes", facts:["The return train journey feels completely different — you are leaving as someone who has seen Machu Picchu!","The cloud forest looks magical in the afternoon light — golden rays cut through the mist.","As the train climbs back the vegetation changes from jungle to Andean grasses.","Your TreXperience taxi driver will be waiting at Ollantaytambo — no waiting, direct to your hotel.","The 1.5 hour drive back to Cusco passes through the Sacred Valley as the sun sets on the Andes.","Arriving in Cusco tonight means sleeping at 3,400m altitude — drink lots of water.","The birthday dinner at Morena Kitchen awaits — window table overlooking the illuminated Plaza de Armas. Aranwa Cusco Boutique Hotel is steps away.","Cusco at night is magical — the plaza is lit up and the energy of the city is alive and warm.","Today has been: 8am Machu Picchu Circuit 2A, thermal baths, train, taxi, birthday dinner. Legendary.","The Plaza de Armas in Cusco was the ceremonial heart of the Inca Empire — 500 years of history."] },
    { time:"15:20", end:"17:08", name:"PeruRail Expedition 34 — Machu Picchu to Ollantaytambo", desc:"Departs 15:20 arrives Ollantaytambo 17:08. TreXperience private taxi waiting at Ollantaytambo for drive to Cusco (~1.5 hrs). Sit back and enjoy the cloud forest one last time.", type:"logistics", place:"Cloud Forest Railway" },
    { time:"17:08", end:"19:00", name:"Taxi — Ollantaytambo to Cusco", desc:"TreXperience driver waiting at Ollantaytambo station. ~1.5 hr drive through the Sacred Valley to Cusco. Check in to Aranwa Cusco Boutique Hotel.", type:"logistics", place:"Sacred Valley" },
    { time:"19:00", end:"20:30", name:"Arrive + check in — Aranwa Cusco Boutique Hotel", desc:"5-star boutique hotel in the Cusco historic center. Freshen up for the birthday dinner at Morena Kitchen. Window table overlooking the Plaza de Armas — reserved!", type:"logistics", place:"Cusco", facts:["Cusco at night is one of the most beautiful cities in South America — warm lights on colonial stone walls.","The Plaza de Armas at night is surrounded by illuminated colonial buildings built on Inca foundations.","Cusco sits in a natural bowl surrounded by mountains — at night the city lights reflect off hillsides.","The altitude at 3,400m means you should drink water and take it easy on the first night back.","The famous 12-angled stone in Hatunrumiyoc Street fits perfectly with all 12 surrounding stones.","Cusco has over 200 colonial churches built by the Spanish — many on top of original Inca temples.","The city has been continuously inhabited for over 3,000 years — one of the oldest cities in the Americas.","You can literally see Inca stonework on the ground floors of colonial buildings throughout the city.","Tonight you celebrate a birthday in the former capital of the greatest empire in the Americas.","The candlelit streets of Cusco historic center at night are genuinely magical."] },
    { time:"20:30", end:"22:30", name:"Birthday dinner — Morena Peruvian Kitchen", desc:"Window table overlooking the illuminated Plaza de Armas. Reserved. Birthday decoration on the table. Famous for trucha tacos, trout ceviche, and pollo a la brasa. The finest birthday dinner in Cusco.", type:"birthday", place:"Cusco Plaza de Armas", facts:["The Plaza de Armas in Cusco was called Huacaypata by the Incas — meaning Place of Weeping for ceremonies.","The two churches on the plaza were both built on top of Inca palaces.","La Catedral took 100 years to build and contains the famous Last Supper painting with guinea pig!","The plaza was the location of the most important Inca ceremonies, festivals, and political events.","Peruvian trucha (trout) is some of the freshest fish you will ever eat — rivers are ice-cold mountain water.","Morena Kitchen is known for inventive takes on regional ingredients with outstanding presentation.","A birthday dinner with a Plaza de Armas view is one of the most memorable restaurant experiences in Peru.","The lights of the plaza in the evening illuminate the cathedral in golden light — incredible backdrop.","Today has been one of the most extraordinary days of your family life. Happy birthday!","Cheers to a birthday at Machu Picchu — there are very few more epic ways to celebrate."] }
  ],
  "2026-05-04": [
    { time:"11:45", end:"12:30", name:"Depart Aranwa — Sacred Valley day trip", desc:"Driver picks up from Aranwa Cusco Boutique Hotel. Heading to Chinchero, Moray, and Maras salt mines. Great day in the Sacred Valley!", type:"logistics", place:"Cusco", facts:["Cusco sits at 3,400m — your body is well acclimatized after 4 days here.","The Sacred Valley stretches 60km between Cusco and Machu Picchu along the Urubamba River.","Today you will visit three completely different Inca and natural sites in one afternoon.","Chinchero sits at 3,780m — the highest point of your entire trip!","The Sacred Valley has been continuously farmed for over 3,000 years.","Your driver knows the route well — trust their judgment on timing and traffic.","Bring sunscreen SPF50+ — high altitude UV is very strong even on cloudy days.","Bring 400 soles cash for tickets, entry fees, and lunch at La Portada.","Comfortable walking shoes are essential — the sites have uneven stone paths.","The Sacred Valley air is noticeably easier to breathe than Cusco — enjoy it!"] },
    { time:"12:30", end:"13:15", name:"Textile demonstration — Chinchero", desc:"Weaving demonstration by local artisan family near the archaeological site. Natural dyes, alpaca wool techniques, traditional Andean textiles. Interesting for the kids!", type:"morning", place:"Chinchero", facts:["Chinchero sits at 3,780m — the highest point of your entire trip!","The word Chinchero means place of the rainbow in Quechua.","Andean weavers use cochineal insects, indigo plants, and mineral pigments for natural dyes.","A single traditional textile can take weeks or months to complete by hand.","The alpaca fibre used in Chinchero textiles comes from herds grazing in the Sacred Valley.","Chinchero is famous throughout Peru for the quality of its traditional weaving.","The concentric diamond patterns in Andean textiles represent mountains and the Inca cosmology.","Women in Chinchero have passed weaving knowledge from mother to daughter for generations.","Natural dyes from this region produce colours that last hundreds of years without fading.","The weaving cooperatives in Chinchero are community-owned — profits stay with local families."] },
    { time:"13:15", end:"14:00", name:"Chinchero archaeological site", desc:"Inca walls, colonial church built on Inca palace, Plaza views over the Sacred Valley and snow-capped Andes. Boleto Turistico — site 1 of 4. Allow 45 mins.", type:"morning", place:"Chinchero", facts:["Chinchero sits at 3,780m — the highest point of your entire trip!","The colonial church here was built directly on top of an Inca palace by the Spanish.","The church interior has extraordinary indigenous murals — unique in all of Peru.","The massive Inca walls lining the plaza are some of the best-preserved in the Sacred Valley.","Standing on the Inca platform gives a breathtaking panorama of the snow-capped Andes.","The plaza was the site of major Inca ceremonies and market days.","Chinchero had its own royal Inca palace — Tupac Yupanqui used it as his personal estate.","The stonework at Chinchero uses the same no-mortar technique as Machu Picchu.","The market at Chinchero on Sundays is one of the most authentic in the entire Sacred Valley.","You can see the peaks of Chicón and Verónica from the archaeological site on a clear day."] },
    { time:"14:00", end:"14:25", name:"Drive to Moray", desc:"~25 min scenic drive through the Sacred Valley highlands. Passing through Andean highland communities and potato farms.", type:"logistics", place:"Sacred Valley", facts:["The Sacred Valley stretches 60km between Cusco and Machu Picchu along the Urubamba River.","The highlands between Chinchero and Moray are some of the most remote farming communities in the region.","The potato was domesticated in this exact region of the Andes over 7,000 years ago.","You might see local farmers using traditional foot ploughs (chaquitaclla) — unchanged for 500 years.","The Sacred Valley has been continuously farmed for over 3,000 years without interruption.","Andean communities here still follow the agricultural calendar based on the Inca lunar cycle.","The altitude in this area ranges from 3,400m to 3,800m — genuinely high altitude farming.","The view driving through the highlands shows Andean peaks in every direction.","Llamas and alpacas graze freely on the hillsides throughout this drive.","The rock formations you see in photos of the black and grey stones are metamorphic rocks embedded in red clay soil."] },
    { time:"14:25", end:"15:15", name:"Moray — concentric Inca terraces", desc:"Mysterious concentric circular terraces descending 30m underground — the Inca agricultural laboratory. Each level is a different microclimate. Your 8-year-old will love running to the bottom! Boleto Turistico — site 2 of 4.", type:"afternoon", place:"Moray", facts:["Moray sits at 3,500m — the concentric circles descend 30m below the surrounding plain.","The Incas engineered up to 15C temperature difference between the top and bottom terraces.","This was the Inca agricultural research center — they grew crops from different altitudes here.","The underground drainage system built 500 years ago still works perfectly today — no standing water ever accumulates.","From the rim the circles look impossibly symmetrical — almost like a natural amphitheatre.","There is a smaller second circle 200m away that most tourists miss completely.","The acoustics at the bottom are extraordinary — whisper and the sound carries around the circle.","Metamorphic rock with quartz veins is visible in the terrace walls — millions of years old.","Moray was likely used to experiment with crops that could feed the empire at different altitudes.","The site was only properly excavated and studied in the 1990s — still yielding new discoveries."] },
    { time:"15:15", end:"15:25", name:"Drive to La Portada — Maras", desc:"~10 min drive from Moray to Maras village. La Portada restaurant is right in the village before the salt mines.", type:"logistics", place:"Sacred Valley", facts:["Maras is a small Andean village of about 2,000 people — entirely dependent on salt production and tourism.","The salt mines at Maras have been operating continuously since before the Inca Empire.","Maras village sits at 3,380m — slightly lower than Moray and Chinchero.","The drive from Moray to Maras passes through some of the most dramatic Sacred Valley scenery.","The salt in Maras comes from a single underground spring that feeds all 3,000+ pools.","La Portada uses organic ingredients grown in their own garden — exceptionally fresh.","Maras salt is exported to gourmet restaurants around the world as a premium ingredient.","The village has maintained its traditional Andean character despite heavy tourist traffic.","Local families own the salt pools in Maras — some have worked the same pool for 500 years.","The afternoon light on the salt pools (3-4pm) creates the most photogenic conditions of the day."] },
    { time:"15:25", end:"16:15", name:"Lunch — La Portada, Maras", desc:"Rated 4.9 with 404 reviews. Organic garden ingredients. Chicken fillet with fresh vegetables is outstanding. Chef visits the table. The best meal of the day — worth the wait!", type:"afternoon", place:"Maras", facts:["La Portada grows most of its ingredients in an organic garden on the property.","The chef sources seasonal produce from local Maras farmers for the freshest possible dishes.","The chicken dishes at La Portada use free-range highland chicken — exceptionally flavourful.","The restaurant presentation rivals Lima fine dining at a fraction of the price.","Maras salt — produced right next door — is used in all the dishes here.","The chef personally visits tables to explain each dish and its local ingredients.","At the end of the meal they give guests a gift of Maras salt processed in-house.","The walk leading up to the front door of La Portada is lined with flowering Andean plants.","La Portada has been featured in multiple Peru culinary guides as a hidden Sacred Valley gem.","Reviewers consistently call it one of the best meals of their entire Peru trip."] },
    { time:"16:15", end:"17:00", name:"Maras salt mines", desc:"3,000+ individual salt pools cascading down the mountainside — each owned by a different local family for generations. Pay ~10-20 soles cash at the gate. Afternoon light makes the pink crystals glow.", type:"afternoon", place:"Maras Salt Mines", facts:["Over 3,000 individual salt pools are carved into the mountainside — each owned by a different family.","A single underground spring feeds every pool through ancient Inca-built channels — unchanged for 500 years.","The salt is naturally pink from mineral deposits — iron, calcium, and magnesium in the spring water.","No machinery, no chemicals, no electricity — the sun does all the work, evaporating the water and leaving crystals.","Some families have worked the same pool for 500 years — passed down through generations.","The pools are all different shapes and sizes because each family carved their own over centuries.","From the viewing path above, the pools look like a mosaic of white and pink tiles.","Maras salt is exported to gourmet restaurants worldwide as a premium artisan ingredient.","You can buy a small bag of pink salt directly from a family at the site for a few soles.","The afternoon light at 3-4pm hits the white crystals from a low angle — most photogenic time of day."] },
    { time:"17:00", end:"17:45", name:"Drive back to Cusco", desc:"~45 min drive back to Aranwa Cusco Boutique Hotel through the Sacred Valley. Sit back and enjoy the Andean sunset.", type:"logistics", place:"Sacred Valley", facts:["The drive back passes through the Sacred Valley at golden hour — stunning Andean light.","The mountains surrounding Cusco turn pink and orange at sunset — extraordinary from the road.","You have now visited Chinchero, Moray, and Maras — three very different Sacred Valley experiences.","The Sacred Valley has been continuously farmed for over 3,000 years without interruption.","Llamas and alpacas graze freely on the hillsides throughout the return drive.","The altitude drops noticeably as you re-enter Cusco — your body will feel the shift.","Tonight is your farewell dinner in Cusco — Chicha by Gaston Acurio awaits!","The Aranwa Cusco Boutique Hotel concierge can book your Kantu Spa appointment for tomorrow morning.","You have used 2 of your 4 Boleto Turistico sites today — 2 more tomorrow at Sacsayhuaman and Qenqo.","What an extraordinary afternoon — Chinchero, Moray, and Maras in one sweep. Peru at its finest."] },
    { time:"17:45", end:"19:30", name:"Return to Aranwa — freshen up", desc:"Back at the hotel. Freshen up, rest briefly. Ask concierge to book Kantu Spa tomorrow at 1:30pm (WhatsApp: Calle Inca Roca 118). Farewell dinner at Chicha by Gaston Acurio at 7:30pm.", type:"logistics", place:"Cusco", facts:["The Aranwa Cusco Boutique Hotel is one of the finest 5-star properties in all of Cusco.","Ask the concierge tonight to book your Kantu Spa appointment for tomorrow at 1:30pm.","Kantu Spa is on Calle Inca Roca 118 — 2-min walk from Plaza de Armas.","Tonight is your last dinner in Peru — Chicha by Gaston Acurio is a fitting farewell.","Gaston Acurio is the most celebrated chef in Peru and one of the most famous in Latin America.","Drink plenty of water tonight — altitude dehydration affects sleep quality.","Pack your main bags tonight so tomorrow morning is stress-free before the ruins.","Leave your Boleto Turistico in an accessible pocket — you need it at Sacsayhuaman tomorrow.","Set your alarm for 8am — breakfast at 8:30am and taxi at 9am gets the morning started perfectly.","Tomorrow is your last morning in Cusco — Sacsayhuaman, Qenqo, Qorikancha, spa, and airport."] },
    { time:"19:30", end:"21:30", name:"Farewell dinner — Chicha by Gaston Acurio", desc:"By Peru most celebrated chef. Famous for trout ceviche, pollo saltado, and quinoa risotto. Seasonal menu using fresh Andean ingredients. Sophisticated but warm. Steps from Plaza de Armas.", type:"evening", place:"Cusco", facts:["Gaston Acurio is the most famous chef in Peru — credited with putting Peruvian cuisine on the world map.","Chicha serves updated Andean classics using fresh local ingredients from around Cusco region.","The trout ceviche at Chicha is made with river trout caught in the nearby highlands.","Pollo saltado (stir-fried chicken) at Chicha uses a more refined technique than the street version.","Quinoa has been grown in the Andes for over 5,000 years — Chicha uses native varieties.","Inca Kola — Peru golden soda with a hint of lemon verbena — is the perfect non-alcoholic pairing.","Peruvian cuisine was voted World Best Culinary Destination for 8 consecutive years in a row.","The restaurant interior uses colonial Cusco architecture to create a warm and unique atmosphere.","Ask the server about the seasonal specials — the menu changes regularly with creative takes on Andean ingredients.","This is your last dinner in Peru — a fitting farewell at one of Cusco most celebrated restaurants."] }
  ],
  "2026-05-05": [
    { time:"08:30", end:"09:00", name:"Hotel breakfast — Aranwa", desc:"Last breakfast at the 5-star. Eat well — long travel day ahead. Check out and leave bags with concierge. Boleto Turistico in your pocket for Sacsayhuaman and Qenqo.", type:"morning", place:"Cusco", facts:["The Aranwa Cusco Boutique Hotel serves an outstanding breakfast — enjoy every last bite!","Today you check out but bags stay safely with the concierge until 2pm departure.","Cusco altitude of 3,400m will be missed in one strange way: food tastes more intense at altitude!","The morning light in Cusco bounces off the red tile rooftops creating a beautiful warm glow.","Listen for the church bells — Cusco has over 200 churches and many ring their bells in the morning.","Today you complete your Boleto Turistico with Sacsayhuaman and Qenqo — 4 sites total.","Drink plenty of water this morning — altitude dehydration hits hardest in the morning.","Keep your Boleto Turistico, passports, and 50 soles cash accessible for Qorikancha entry.","Set a reminder to collect bags from concierge by 2pm before the airport taxi.","Last morning in Cusco — soak every moment of it in."] },
    { time:"09:00", end:"09:15", name:"Taxi to Sacsayhuaman", desc:"Ask Aranwa concierge to call a trusted taxi. ~10 min drive, ~15 soles. Agree price before getting in.", type:"logistics", place:"Cusco", facts:["Sacsayhuaman sits at 3,700m — slightly higher than Cusco city center.","The fortress is only 2km from the Plaza de Armas — very close to the hotel.","Taxis from the Aranwa concierge are pre-vetted and reliable — always use hotel-recommended taxis.","Agree the price before getting in — standard fare to Sacsayhuaman is 15-20 soles.","The drive up to Sacsayhuaman gives you beautiful views over Cusco spread below.","Early morning (9am) means almost no crowds at Sacsayhuaman — the best time to visit.","The Boleto Turistico is checked at the entrance gate — have it ready.","Bring your camera — the panoramic view over Cusco from the fortress is extraordinary.","May morning light is golden and warm — perfect photography conditions.","Sacsayhuaman was the site of one of the bloodiest battles in Inca history against the Spanish in 1536."] },
    { time:"09:15", end:"10:45", name:"Sacsayhuaman fortress", desc:"300-ton stones fitted without mortar above Cusco. Kids love scrambling the rock formations. Boleto Turistico — site 3 of 4. Best panoramic view over Cusco red rooftops. Allow 90 mins.", type:"morning", place:"Sacsayhuaman", facts:["Sacsayhuaman is pronounced Sexy Woman by many tourists — actually it means Satisfied Falcon in Quechua!","The largest stone in the fortress weighs an estimated 300 tons — heavier than a blue whale!","The stones were quarried from a mountain 20km away and transported without wheels or iron tools.","The fortress walls are built in three parallel zigzag lines — representing Inca lightning.","From Sacsayhuaman you get the best panoramic view of all of Cusco spread below.","The annual Inti Raymi Festival of the Sun is celebrated here every June 24 with 100,000 spectators.","Kids love Sacsayhuaman because the huge stone terraces are perfect for scrambling and exploring.","The Spanish destroyed much of the upper fortress and used the stones to build Cusco colonial buildings.","Construction is estimated to have taken 20,000 workers over 70 years to complete.","Not even a razor blade can fit between the perfectly fitted blocks."] },
    { time:"10:45", end:"11:10", name:"Qenqo — underground Inca caves", desc:"5-min walk from Sacsayhuaman. Carved rock altar, underground ceremonial chambers. Very atmospheric. Boleto Turistico — site 4 of 4. Only 20 mins — but genuinely extraordinary.", type:"morning", place:"Qenqo", facts:["Qenqo means zigzag in Quechua — named after the carved channels in the main rock.","The underground cave was used for ceremonial mummification of Inca nobles and royalty.","The carved rock altar at the top aligns with the sun during the winter solstice.","Qenqo is visited by very few tourists — you will likely have it almost entirely to yourself.","The cave entrance feels narrow but opens into a surprisingly large underground chamber.","Inca priests performed rituals here involving chicha (corn beer) poured through the carved channels.","The site dates to the same period as Sacsayhuaman — 15th century CE.","Your 8-year-old will love the underground cave — it feels like a real adventure.","This is your 4th and final Boleto Turistico site — ticket fully used!","Qenqo is one of the most underrated Inca sites near Cusco — almost nobody talks about it."] },
    { time:"11:15", end:"11:30", name:"Taxi to Qorikancha", desc:"Grab a passing taxi from Sacsayhuaman back into the city. ~10 min, ~10 soles. Ask for Qorikancha or Santo Domingo church — same place.", type:"logistics", place:"Cusco", facts:["Qorikancha is in the historic center of Cusco — very close to the Plaza de Armas.","The Church of Santo Domingo was built by the Spanish directly on top of Qorikancha.","The drive down from Sacsayhuaman to Qorikancha is a beautiful descent through colonial Cusco streets.","Taxis are plentiful near Sacsayhuaman — many wait specifically for tourists heading back down.","The fare from Sacsayhuaman to Qorikancha should be 10-15 soles — agree before getting in.","Qorikancha opens at 8:30am daily and entry costs 20 soles per adult, less for children.","The site is best visited in the morning when light enters the famous alignment windows.","Bring 50 soles cash for the 2 adults and 1 child entry fees.","The curved outer wall of Qorikancha is considered the finest Inca stonework in existence.","You are about to visit the most sacred site in the entire Inca Empire."] },
    { time:"11:30", end:"13:00", name:"Qorikancha — Temple of the Sun", desc:"Most sacred Inca temple — walls once covered in 700 solid gold sheets. Spanish built a church on top. Curved outer wall is the finest Inca stonework in existence. 20 soles/adult, ~50 soles total. Allow 90 mins.", type:"morning", place:"Qorikancha", facts:["Qorikancha means Golden Enclosure in Quechua — its walls were once covered in 700 solid gold sheets!","The Spanish melted all the gold and sent it to Spain — an act of cultural destruction still mourned.","The Spanish built the Church of Santo Domingo directly on top of Qorikancha — the Inca walls still support it.","The Inca stonework at Qorikancha survived the 1650 Cusco earthquake perfectly — the Spanish additions crumbled.","This was the most sacred site in the entire Inca Empire — even more important than Machu Picchu.","Inside were life-size gold statues of past Inca emperors and a solid gold sun disc.","The curved outer wall of Qorikancha is considered the finest example of Inca stonework in existence.","At the solstice sunlight enters through a specific window and illuminates the altar exactly.","Qorikancha was dedicated to Inti the Sun God — the Incas believed their emperor was the son of the sun.","Archaeologists are still discovering new chambers and tunnels beneath Qorikancha to this day."] },
    { time:"13:00", end:"13:45", name:"Last lunch in Cusco — Plaza de Armas", desc:"5-min walk to Plaza de Armas. KUSYKAY (trucha andina, pollo tacos) or any plaza terrace. Last Peruvian trout and chicha morada! Keep it light — long travel day ahead.", type:"afternoon", place:"Cusco Historic Center", facts:["The Plaza de Armas has been the heart of Cusco for over 3,000 years — first as Inca ceremonial center, then as Spanish colonial plaza.","KUSYKAY is rated 4.9 with over 10,000 reviews — consistently one of the best in Cusco.","Trucha andina (Andean trout) is the perfect last meal in Peru — fresh, light, and distinctly Andean.","Chicha Morada (purple corn drink) is the perfect non-alcoholic pairing for any Peruvian meal.","The cathedral on the plaza took 100 years to build — completed in 1654.","This is your last meal in Peru — savour every bite of the trucha and chicha morada.","The Plaza de Armas at lunchtime buzzes with locals and tourists — a perfect final Cusco scene.","Look up at the mountains surrounding Cusco one last time from the plaza.","You can see Sacsayhuaman fortress on the hillside above — you were just there this morning!","Goodbye Cusco — the Navel of the World. Until next time."] },
    { time:"13:45", end:"14:30", name:"Kantu Spa — Inca hot stone massage", desc:"Calle Inca Roca 118 — 2-min walk from Plaza de Armas. Book tonight by WhatsApp. 30-45 min Inca hot stone session. The perfect post-ruins Cusco send-off. Skip if lunch runs late.", type:"afternoon", place:"Cusco Historic Center", facts:["Kantu Spa is consistently rated the best massage center in all of Cusco.","The Inca Special massage with hot stones is their signature treatment — deeply relaxing.","After Sacsayhuaman, Qenqo, and Qorikancha your legs will genuinely deserve this.","Hot stone massage uses heated volcanic stones — the warmth penetrates muscle much deeper than hands alone.","At altitude (3,400m) your muscles carry extra tension from working harder to oxygenate.","A 30-min session is enough for a meaningful treatment and fits perfectly in the schedule.","The spa serves coca tea at the end of every session — a perfect Andean farewell ritual.","Book by WhatsApp tonight to secure the 1:45pm slot — they fill up fast.","The therapists at Kantu speak English and are trained in both Inca and modern techniques.","This is the perfect final memory of Cusco — relaxed, rejuvenated, and ready for Bogota."] },
    { time:"14:30", end:"15:00", name:"Return to Aranwa — collect bags", desc:"Walk or taxi back to the Aranwa. Collect all luggage from concierge. Last look at Cusco historic center on the way out.", type:"logistics", place:"Cusco", facts:["The walk from Kantu Spa to Aranwa is about 10 minutes through the beautiful historic center.","Collect all luggage from the concierge — confirm nothing has been left behind.","Take one last look at the Plaza de Armas as you leave — you will miss it.","The Aranwa Cusco Boutique Hotel has been an extraordinary base for this part of the trip.","The concierge can call you a reliable taxi to the airport — ask them now.","Cusco airport (Alejandro Velasco Astete) is about 20 minutes from the hotel by taxi.","Allow at least 2 hours before departure for international check-in — arrive by 3pm.","You have now completed: Machu Picchu, Aguas Calientes, Sacred Valley, Cusco city, Chinchero, Moray, Maras. Extraordinary.","Drink water on the way to the airport — altitude dehydration hits hard before a long flight.","Goodbye Cusco — what an unforgettable few days in the former capital of the Inca Empire."] },
    { time:"15:00", end:"17:10", name:"Taxi to Cusco Airport (CUZ)", desc:"Ask Aranwa concierge to arrange taxi. ~20 min drive. Arrive airport by 3pm for 5:10pm departure. AV104 check-in, duty-free Peruvian coffee shopping, last empanada at the terminal!", type:"logistics", place:"Cusco Airport", facts:["Cusco Airport is one of the few airports where you fly out over a mountain range immediately after takeoff.","The view from a plane leaving Cusco shows the Sacred Valley and Andean peaks!","AV104 connects the ancient Inca capital to the modern Colombian capital in under 4 hours.","Cusco airport sits at 3,399m — takeoff requires much more runway than airports at sea level.","Peruvian airports sell excellent local products: quinoa, coffee, pisco, and alpaca goods.","This is your last look at the Andes from the ground for now — look at those peaks!","The flight south to Bogota takes you over some of the wildest terrain in South America.","Bogota sits at 2,600m altitude — still high but lower than Cusco, you will feel the difference.","Colombia is famous for its coffee, street food, colonial architecture, and warm people.","You are leaving one ancient capital (Cusco) for another incredible city (Bogota)."] },
    { time:"17:10", end:"20:00", name:"AV104 — Cusco to Bogota", desc:"Departs 5:10pm. ~3.5 hr flight. Arrives El Dorado International Airport ~8pm. Hilton Garden Inn free shuttle waiting.", type:"logistics", place:"In the Air", facts:["The flight from Cusco to Bogota crosses the entire Amazon basin — look down and see endless jungle!","You are flying from Peru to Colombia — Pacific coast country to Caribbean and Pacific coast country.","Bogota is the third-highest capital city in the world at 2,600m — after Quito and La Paz.","Colombia has gone through a remarkable transformation — now one of South America top travel destinations.","Bogota elevation means the climate is spring-like year-round — locals call it the eternal spring.","The flight crosses into Colombia over some of the world most biodiverse cloud forests.","Colombia is the only country in South America with coastlines on both the Pacific and the Caribbean.","Bogota has more museums per capita than almost any other city in Latin America.","Avianca is Colombia flag carrier and one of the oldest airlines in the Americas — founded in 1919!","You have completed Cusco, Sacred Valley, Aguas Calientes, and Machu Picchu. Now Bogota. What a trip!"] },
    { time:"20:00", end:"22:00", name:"Arrive Bogota + Hilton Garden Inn", desc:"Call hotel from arrivals for the free airport shuttle. Check in. Spa whirlpool open late — perfect end to the Peru chapter.", type:"logistics", place:"Bogota, Colombia", facts:["El Dorado International Airport is named after the legendary city of gold that Spanish conquistadors searched for.","Bogota population is 8 million people — one of the largest cities in South America.","The city has an incredible cycle lane network called Ciclovia — 120km of dedicated bike paths.","Every Sunday in Bogota 120km of roads are closed to cars and opened to cyclists — 2 million people participate!","Bogota has transformed dramatically since 2000 — now one of the most innovative cities in the world.","The Hilton Garden Inn is right next to the airport — perfect for a late arrival.","Bogota sits on a high plateau called the Sabana surrounded by mountains on the east.","The city Gold Museum holds 55,000 pre-Colombian gold pieces — the largest gold collection in the world!","Bogota street food scene features arepas, empanadas, and bandeja paisa — all delicious.","The temperature in Bogota is around 14C year-round — bring a light jacket for the morning!"] }
  ],
  "2026-05-06": [
    { time:"08:00", end:"09:00", name:"Breakfast + leave bags at hotel", desc:"All luggage stored at Hilton reception. Light daypack only. Must be at airport by 12:30pm for 2:50pm departure — plan accordingly!", type:"morning", place:"Bogota, Colombia", facts:["Bogota breakfast culture is incredible — try a changua (milk soup with egg) or an arepa con queso!","Colombian coffee at breakfast in Colombia is the real deal — some of the world finest beans.","Bogota is a city of 8 million at 2,600m altitude — traffic can be heavy so Uber is always smart.","Today you have about 4 hours to explore before needing to head to the airport.","The Hilton Garden Inn holds luggage all day after checkout — essential for a transit-day city visit.","AV262 departs at 2:50pm — you need to be at El Dorado by 12:30pm at the latest.","Bogota street art scene is internationally famous — La Candelaria has murals on almost every wall.","Colombia national sport is cycling — Colombians have won the Tour de France multiple times!","Uber in Bogota is safe, reliable, and very affordable compared to taxis.","Bogota receives about 4 million tourists per year — one of South America fastest-growing destinations."] },
    { time:"09:00", end:"10:30", name:"Monserrate cable car", desc:"Panoramic Bogota views from 3,150m. Priority pass purchased. Cable car up, funicular down for variety. Allow 90 mins total including queuing. Leave by 10:30am sharp to keep schedule.", type:"morning", place:"Cerro Monserrate, Bogota", facts:["Monserrate peak stands at 3,152m — from the top you see all of Bogota spread across the Sabana.","The white church at the top is one of the most visited pilgrimage sites in Colombia.","The cable car covers 854m of elevation in about 5 minutes — one of the most thrilling urban cable car rides.","On a clear day you can see the entire city of Bogota from Monserrate — 8 million people below!","The funicular (rack railway) that runs parallel to the cable car has been operating since 1929.","Monserrate is visited by over 3 million people per year — priority pass skips the 2-hour queue!","The peak is often in the clouds — if it is clear in the morning go immediately! Clouds roll in by noon.","Local vendors at the top sell fresh strawberries with cream — a Bogota tradition at Monserrate.","The view shows the Andes mountain range extending in both directions — you can see forever on a clear day.","Your 8-year-old will love the cable car ride — the view looking back over the city is breathtaking."] },
    { time:"10:30", end:"10:50", name:"Uber to La Candelaria", desc:"Uber from Monserrate to the historic district (~20 min). Quick and reliable. Tell driver La Candelaria — Plaza Bolivar.", type:"logistics", place:"Bogota", facts:["La Candelaria is Bogota historic heart — founded by the Spanish in 1538.","The neighborhood sits at the foot of Monserrate mountain — dramatic mountains in every photo.","Uber in Bogota is safe, reliable, and very affordable compared to taxis.","The streets of La Candelaria are lined with colonial buildings painted in vivid yellow, red, and blue.","Street food vendors in La Candelaria sell empanadas de pipian — a Bogota specialty.","The gold museum in La Candelaria has 55,000 pre-Colombian gold pieces.","Fernando Botero donated 123 sculptures and paintings to Bogota — many are here.","The streets of La Candelaria are safe during the day when busy.","Plaza Bolivar is the heart of La Candelaria — surrounded by the Capitol, City Hall, Cathedral.","Bogota receives about 4 million tourists per year — one of South America fastest-growing destinations."] },
