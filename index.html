<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Peru Trip 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#1A1A1A;color:#E8E0D0;font-family:'DM Sans',sans-serif;min-height:100vh;display:flex;flex-direction:column}
.header{background:linear-gradient(135deg,#1A1208 0%,#2A1F0A 50%,#1A1208 100%);border-bottom:1px solid #C8933A;padding:20px 20px 16px;text-align:center;position:relative}
.header h1{font-family:'Playfair Display',serif;font-size:22px;font-weight:500;color:#C8933A;letter-spacing:.02em}
.header-sub{font-size:12px;color:#9A8E7E;letter-spacing:.08em;text-transform:uppercase;margin-top:3px}
.live-time{position:absolute;top:16px;right:16px;font-size:11px;color:#9A8E7E;font-weight:300;text-align:right;line-height:1.5}
.tz-note{font-size:9px;color:#6A5E4E}
.main{flex:1;padding:24px 20px;max-width:480px;margin:0 auto;width:100%;display:flex;flex-direction:column;gap:16px}
.day-label{font-size:11px;font-weight:500;color:#9A8E7E;letter-spacing:.1em;text-transform:uppercase;text-align:center}
.current-card{background:linear-gradient(135deg,#1C2E1C,#162816);border:1px solid #40916C;border-radius:20px;padding:24px;position:relative;overflow:hidden}
.current-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,#2D6A4F,#40916C,#2D6A4F)}
.next-card{background:#2A2A2A;border:1px solid #3A3A3A;border-radius:20px;padding:24px}
.birthday-card{background:linear-gradient(135deg,#2A0A18,#1E0812);border:1px solid #7A2040;border-radius:20px;padding:24px;position:relative;overflow:hidden}
.birthday-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,#7A2040,#D4537E,#7A2040)}
.card-label{font-size:10px;font-weight:500;letter-spacing:.12em;text-transform:uppercase;margin-bottom:14px;display:flex;align-items:center;gap:7px;color:#40916C}
.birthday-card .card-label{color:#D4537E}
.next-card .card-label{color:#9A8E7E}
.pulse{width:7px;height:7px;border-radius:50%;background:#40916C;animation:pulse 2s infinite;flex-shrink:0}
.bpulse{width:7px;height:7px;border-radius:50%;background:#D4537E;animation:pulse 2s infinite;flex-shrink:0}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(.8)}}
.tag{display:inline-block;font-size:10px;padding:3px 9px;border-radius:99px;margin-bottom:10px;font-weight:500;letter-spacing:.04em;text-transform:uppercase}
.tag-logistics{background:#1B3A5C;color:#7EC8E3}
.tag-morning{background:#3D2B00;color:#FFBC42}
.tag-afternoon{background:#0D3328;color:#56D98F}
.tag-evening{background:#2A1A40;color:#B09FE8}
.tag-birthday{background:#3D0A1E;color:#FF7AAD}
.tag-priority{background:#3D0000;color:#FF7070}
.activity-time{font-size:12px;color:#9A8E7E;margin-bottom:6px;font-weight:300}
.activity-name{font-family:'Playfair Display',serif;font-size:22px;font-weight:400;line-height:1.3;margin-bottom:10px}
.birthday-card .activity-name{color:#FFB8D4}
.activity-desc{font-size:13px;color:#9A8E7E;line-height:1.7;font-weight:300}
.progress-wrap{margin-top:16px}
.prog-track{height:3px;background:rgba(255,255,255,.08);border-radius:99px;overflow:hidden;margin-bottom:6px}
.prog-fill{height:100%;background:#40916C;border-radius:99px}
.prog-labels{display:flex;justify-content:space-between;font-size:11px;color:#9A8E7E}
.free-card{background:#2A2A2A;border:1px solid #3A3A3A;border-radius:20px;padding:40px 24px;text-align:center}
.free-icon{font-size:40px;margin-bottom:16px}
.free-title{font-family:'Playfair Display',serif;font-size:20px;color:#C8933A;margin-bottom:8px}
.free-sub{font-size:13px;color:#9A8E7E;line-height:1.6}
.pre-card{background:#2A2A2A;border:1px solid #3A3A3A;border-radius:20px;padding:40px 24px;text-align:center}
.pre-icon{font-size:40px;margin-bottom:12px}
.pre-title{font-family:'Playfair Display',serif;font-size:20px;color:#C8933A;margin-bottom:8px}
.pre-sub{font-size:13px;color:#9A8E7E;line-height:1.6}
.cd-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin:16px 0}
.cd-cell{background:#1F1A10;border:1px solid #3A3020;border-radius:10px;padding:10px 4px;text-align:center}
.cd-num{font-family:'Playfair Display',serif;font-size:24px;color:#C8933A;display:block}
.cd-unit{font-size:10px;color:#9A8E7E;letter-spacing:.06em;text-transform:uppercase}
.nothing-card{background:#2A2A2A;border:1px dashed #3A3A3A;border-radius:20px;padding:28px 24px;text-align:center}
.nothing-card .ni{font-size:24px;margin-bottom:8px}
.nothing-card .nt{font-family:'Playfair Display',serif;font-size:16px;color:#9A8E7E;margin-bottom:4px}
.nothing-card .ns{font-size:13px;color:#5A5040}

.facts-card{background:#1F1A10;border:1px solid #3A3020;border-radius:16px;padding:18px 20px;margin-top:4px}
.facts-header{display:flex;align-items:center;gap:8px;margin-bottom:14px}
.facts-icon{font-size:18px}
.facts-title{font-size:11px;font-weight:500;letter-spacing:.1em;text-transform:uppercase;color:#C8933A}
.facts-place{font-size:12px;color:#9A8E7E;margin-top:1px}
.fact-item{display:flex;gap:10px;margin-bottom:10px;align-items:flex-start;cursor:pointer}
.fact-item:last-child{margin-bottom:0}
.fact-num{width:22px;height:22px;border-radius:50%;background:#3A3020;border:1px solid #C8933A;
  font-size:10px;font-weight:500;color:#C8933A;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px}
.fact-text{font-size:13px;color:#9A8E7E;line-height:1.6;flex:1}
.fact-item.revealed .fact-num{background:#C8933A;color:#1A1208}
.fact-item.revealed .fact-text{color:#E8E0D0}
.reveal-hint{font-size:11px;color:#6A5E4E;text-align:center;margin-top:10px;font-style:italic}
</style>
</head>
<body>
<div class="header">
  <div class="live-time">
    <span id="clockDisplay">--:-- --</span>
    <div class="tz-note" id="clockDate">Lima time</div>
  </div>
  <h1>Peru Trip 2026</h1>
  <div class="header-sub">May 1–6, 2026</div>
</div>
<div class="main" id="main"></div>

<script src="events.js"></script>
<script>
function updateClock() {
  const now = getPeruTime();
  document.getElementById('clockDisplay').textContent = now.toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit',hour12:true});
  document.getElementById('clockDate').textContent = `Lima · ${now.toLocaleDateString('en-US',{month:'short',day:'numeric'})}`;
}

function factsHTML(item) {
  if (!item || !item.facts || !item.facts.length) return '';
  const place = item.place || 'This location';
  let html = `<div class="facts-card">
    <div class="facts-header">
      <span class="facts-icon">💡</span>
      <div>
        <div class="facts-title">Did you know?</div>
        <div class="facts-place">${place}</div>
      </div>
    </div>`;
  item.facts.forEach((f, i) => {
    html += `<div class="fact-item" id="fact-${i}" onclick="revealFact(${i})">
      <div class="fact-num">${i+1}</div>
      <div class="fact-text">${f}</div>
    </div>`;
  });
  html += `<div class="reveal-hint">Tap any fact to highlight it</div></div>`;
  return html;
}

function revealFact(i) {
  const el = document.getElementById('fact-' + i);
  if (el) el.classList.toggle('revealed');
}

function renderCard(current, nextWithinHour, nowMins, isBirthday) {
  let html = '';
  if (current) {
    const isBday = current.type === 'birthday';
    const tc = TYPE_CONFIG[current.type] || TYPE_CONFIG.logistics;
    const dur = toMins(current.end) - toMins(current.time);
    const elapsed = nowMins - toMins(current.time);
    const pct = Math.min(100, Math.max(0, Math.round((elapsed/dur)*100)));
    const rem = toMins(current.end) - nowMins;
    const remStr = rem > 60 ? `${Math.floor(rem/60)}h ${rem%60}m left` : `${rem}m left`;
    html += `<div class="${isBday ? 'birthday-card' : 'current-card'}">
      <div class="card-label"><span class="${isBday?'bpulse':'pulse'}"></span>${isBday ? 'Happening now — Birthday moment!' : 'Happening now'}</div>
      <span class="tag ${tc.cls}">${tc.label}</span>
      <div class="activity-time">${current.time} – ${current.end}</div>
      <div class="activity-name">${current.name}</div>
      <div class="activity-desc">${current.desc}</div>
      <div class="progress-wrap">
        <div class="prog-track"><div class="prog-fill" style="width:${pct}%"></div></div>
        <div class="prog-labels"><span>${pct}% complete</span><span>${remStr}</span></div>
      </div>
    </div>`;
  }
  if (nextWithinHour) {
    const tc = TYPE_CONFIG[nextWithinHour.type] || TYPE_CONFIG.logistics;
    const startsIn = toMins(nextWithinHour.time) - nowMins;
    const startsStr = startsIn <= 1 ? 'starting now' : startsIn < 60 ? `in ${startsIn} min` : 'in 1 hr';
    html += `<div class="next-card">
      <div class="card-label">Up next · ${startsStr}</div>
      <span class="tag ${tc.cls}">${tc.label}</span>
      <div class="activity-time">${nextWithinHour.time} – ${nextWithinHour.end}</div>
      <div class="activity-name">${nextWithinHour.name}</div>
      <div class="activity-desc">${nextWithinHour.desc}</div>
    </div>`;
  } else if (current) {
    html += `<div class="nothing-card"><div class="ni">🌿</div><div class="nt">Nothing in the next hour</div><div class="ns">Enjoy the moment — next activity coming later</div></div>`;
  }
  return html;
}

function render() {
  const main = document.getElementById('main');
  const now = getPeruTime();
  const nowMins = now.getHours()*60 + now.getMinutes();
  const todayKey = getTodayKey();
  const tripStart = new Date(TRIP_CONFIG.tripStart);
  const tripEnd = new Date(TRIP_CONFIG.tripEnd);
  const isBirthday = todayKey === TRIP_CONFIG.birthdayDate;

  if (now < tripStart) {
    const diff = tripStart - now;
    const cd = fmtCountdown(diff);
    main.innerHTML = `<div class="pre-card">
      <div class="pre-icon">✈️</div>
      <div class="pre-title">Adventure starts soon!</div>
      <div class="pre-sub" id="departSub">Departing ${TRIP_CONFIG.departureCity} · April 30</div>
      <div class="cd-grid">
        <div class="cd-cell"><span class="cd-num" id="cd-d">${cd.d}</span><span class="cd-unit">days</span></div>
        <div class="cd-cell"><span class="cd-num" id="cd-h">${cd.h}</span><span class="cd-unit">hrs</span></div>
        <div class="cd-cell"><span class="cd-num" id="cd-m">${cd.m}</span><span class="cd-unit">min</span></div>
        <div class="cd-cell"><span class="cd-num" id="cd-s">${cd.s}</span><span class="cd-unit">sec</span></div>
      </div>
      <div style="margin-top:16px;background:#1F1A10;border:1px solid #3A3020;border-radius:12px;padding:14px 16px;text-align:left">
        <div style="font-size:10px;font-weight:500;letter-spacing:.1em;text-transform:uppercase;color:#C8933A;margin-bottom:10px">First flight</div>
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
          <div>
            <div style="font-family:'Playfair Display',serif;font-size:22px;color:#E8E0D0">ORD</div>
            <div style="font-size:11px;color:#9A8E7E">Chicago O'Hare</div>
          </div>
          <div style="text-align:center">
            <div style="font-size:11px;color:#C8933A;margin-bottom:3px">AV263</div>
            <div style="font-size:18px;color:#9A8E7E">✈</div>
            <div style="font-size:10px;color:#6A5E4E">~5h 10m</div>
          </div>
          <div style="text-align:right">
            <div style="font-family:'Playfair Display',serif;font-size:22px;color:#E8E0D0">BOG</div>
            <div style="font-size:11px;color:#9A8E7E">Bogota</div>
          </div>
        </div>
        <div style="border-top:1px solid #3A3020;padding-top:8px;display:flex;justify-content:space-between">
          <div style="font-size:12px;color:#9A8E7E">Departs <strong style="color:#E8E0D0">11:20 PM</strong></div>
          <div style="font-size:12px;color:#9A8E7E">Apr 30 · Thu</div>
          <div style="font-size:12px;color:#9A8E7E">Arrives <strong style="color:#E8E0D0">~5:30 AM</strong></div>
        </div>
      </div>
    </div>`;
    return;
  }

  if (now >= tripEnd) {
    main.innerHTML = `<div class="free-card"><div class="free-icon">🏡</div><div class="free-title">Back home safely!</div><div class="free-sub">What an incredible trip — Machu Picchu on a birthday, Peru, and Bogota.<br>Welcome back, family!</div></div>`;
    return;
  }

  const { current, nextWithinHour } = resolveActivity(todayKey, nowMins);
  let html = `<div class="day-label">${DAY_LABELS[todayKey] || todayKey}</div>`;
  if (isBirthday) html += `<div style="text-align:center;font-size:28px;letter-spacing:4px;margin:-4px 0 4px">🎂 🎉 🌄</div>`;

  if (current || nextWithinHour) {
    html += renderCard(current, nextWithinHour, nowMins, isBirthday);
  } else {
    html += `<div class="free-card"><div class="free-icon">🌙</div><div class="free-title">Day complete</div><div class="free-sub">All activities for today are done. Rest well!</div></div>`;
  }
  main.innerHTML = html;
}

function updateDepartSub() {
  const el = document.getElementById('departSub');
  if (!el) return;
  const now = getPeruTime();
  const landing = new Date(TRIP_CONFIG.landingCusco);
  const depart = new Date('2026-04-30T23:20:00');
  const diffMs = landing - now;
  const diffHrs = diffMs / 3600000;
  if (now >= depart && diffHrs <= 4 && diffHrs > 0) {
    const mins = Math.round(diffMs / 60000);
    const hrs = Math.floor(mins/60), remMins = mins%60;
    el.innerHTML = `✈️ Landing in Cusco in <strong style="color:#C8933A">${hrs>0?hrs+'h ':''}${remMins}m</strong>`;
  } else {
    el.textContent = `Departing ${TRIP_CONFIG.departureCity} · April 30`;
  }
}

function tickCountdown() {
  const now = getPeruTime();
  const tripStart = new Date(TRIP_CONFIG.tripStart);
  if (now >= tripStart) return;
  const cd = fmtCountdown(tripStart - now);
  const d=document.getElementById('cd-d'),h=document.getElementById('cd-h'),m=document.getElementById('cd-m'),s=document.getElementById('cd-s');
  if(d)d.textContent=cd.d; if(h)h.textContent=cd.h; if(m)m.textContent=cd.m; if(s)s.textContent=cd.s;
}

updateClock(); render();
setInterval(updateClock, 1000);
setInterval(tickCountdown, 1000);
setInterval(updateDepartSub, 30000);
setInterval(render, 60000);
updateDepartSub();
</script>
</body>
</html>
